<title>Griffin Hall</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
  :root {
    --parchment: #f4ecd8;
    --parchment-warm: #ece2c4;
    --parchment-deep: #e0d4b1;
    --navy: #1a2942;
    --navy-deep: #0f1a2c;
    --navy-soft: #2c3a55;
    --gold: #c9a44c;
    --gold-light: #e0bd6a;
    --gold-deep: #a8852f;
    --crimson: #9b2226;
    --crimson-deep: #6f1518;
    --ink: #1a2942;
    --ink-soft: #4a5a72;
    --ink-muted: #7a8aa0;
  }
  html, body { background: var(--parchment); color: var(--ink); }
  body {
    font-family:'Manrope', system-ui, sans-serif;
    background-image:
      radial-gradient(circle at 15% 8%, rgba(201,164,76,0.10) 0%, transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(155,34,38,0.06) 0%, transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(26,41,66,0.04) 0%, transparent 70%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.13 0 0 0 0 0.08 0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    min-height: 100vh;
  }
  .heraldic { font-family:'Cinzel', Georgia, serif; letter-spacing: 0.12em; }
  .font-display { font-family:'Instrument Serif', Georgia, serif; letter-spacing:-0.005em; }
  .ink { color: var(--ink); }
  .ink-soft { color: var(--ink-soft); }
  .ink-muted { color: var(--ink-muted); }
  .bg-parchment { background: var(--parchment); }
  .bg-parchment-warm { background: var(--parchment-warm); }
  .bg-parchment-deep { background: var(--parchment-deep); }
  .bg-navy { background: var(--navy); }
  .bg-navy-deep { background: var(--navy-deep); }
  .bg-gold { background: var(--gold); }
  .bg-gold-light { background: var(--gold-light); }
  .bg-crimson { background: var(--crimson); }
  .text-navy { color: var(--navy); }
  .text-navy-deep { color: var(--navy-deep); }
  .text-gold { color: var(--gold); }
  .text-gold-deep { color: var(--gold-deep); }
  .text-crimson { color: var(--crimson); }
  .text-parchment { color: var(--parchment); }
  .text-parchment-warm { color: var(--parchment-warm); }
  .bg-navy, .bg-crimson { min-height: 44px; }
  .bg-navy:hover, .bg-crimson:hover { box-shadow: 0 0 0 2px var(--gold) inset; }
  .bg-navy:focus-visible, .bg-crimson:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .border-gold { border-color: var(--gold); }
  .border-navy { border-color: var(--navy); }
  .border-ink-soft { border-color: rgba(26,41,66,0.18); }
  .border-gold-soft { border-color: rgba(201,164,76,0.5); }

  .card {
    background: var(--parchment-warm);
    border: 1px solid rgba(26,41,66,0.16);
    box-shadow:
      0 1px 0 rgba(26,41,66,0.05),
      0 6px 24px -16px rgba(26,41,66,0.35);
    border-radius: 14px;
  }
  .card-hover:hover { border-color: rgba(201,164,76,0.7); box-shadow: 0 1px 0 rgba(26,41,66,0.05), 0 14px 36px -20px rgba(26,41,66,0.45); }

  .gold-line {
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    height: 1px;
  }
  .gold-line-strong {
    background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
    height: 2px;
  }

  .progress-bar { background: linear-gradient(90deg, var(--crimson) 0%, var(--gold) 100%); }

  .hero-frame {
    box-shadow:
      0 0 0 1px rgba(26,41,66,0.25),
      0 0 0 6px var(--parchment),
      0 0 0 7px var(--gold),
      0 0 0 11px var(--parchment),
      0 25px 50px -25px rgba(15,26,44,0.5);
  }

  .principle-box {
    background: linear-gradient(180deg, rgba(201,164,76,0.14) 0%, rgba(201,164,76,0.03) 100%);
    border-left: 4px solid var(--gold);
    border-radius: 0 12px 12px 0;
  }
  .modern-box {
    background: linear-gradient(180deg, rgba(155,34,38,0.10) 0%, rgba(155,34,38,0.02) 100%);
    border-left: 4px solid var(--crimson);
    border-radius: 0 12px 12px 0;
  }

  .dispatch-letter {
    border: 1px solid rgba(120, 90, 40, 0.35);
    border-radius: 4px;
    background: linear-gradient(180deg, #f5ead2 0%, #ecdfba 100%);
    box-shadow: inset 0 0 40px rgba(120, 80, 30, 0.08), 0 4px 12px rgba(20, 14, 6, 0.18);
    overflow: hidden;
  }
  .dispatch-summary {
    cursor: pointer;
    padding: 12px 16px;
    background: rgba(120, 80, 30, 0.07);
    border-bottom: 1px solid rgba(120, 90, 40, 0.18);
    color: #5a3a14;
    list-style: none;
    user-select: none;
  }
  .dispatch-summary::-webkit-details-marker { display: none; }
  .dispatch-summary:hover { background: rgba(120, 80, 30, 0.12); }
  .dispatch-letter[open] .dispatch-summary { border-bottom: 1px solid rgba(120, 90, 40, 0.32); }
  .dispatch-summary { display: flex; align-items: center; gap: 8px; }
  .dispatch-icon { display: inline-flex; align-items: center; margin-right: 4px; line-height: 0; }
  .dispatch-chevron {
    margin-left: auto;
    font-size: 14px;
    color: #7a5a2c;
    transition: transform 0.2s ease;
  }
  .dispatch-letter[open] .dispatch-chevron { transform: rotate(180deg); }
  .dispatch-body {
    padding: 28px 32px 32px;
    margin: 0 6px;
    font-family: 'Crimson Text', 'Crimson Pro', Georgia, 'Times New Roman', serif;
    color: #3a2410;
    font-size: 17px;
    line-height: 1.75;
    background:
      linear-gradient(180deg, #f5ead2 0%, #ecdfba 100%),
      radial-gradient(circle at 20% 30%, rgba(120, 80, 30, 0.04) 0px, transparent 60px),
      radial-gradient(circle at 80% 70%, rgba(120, 80, 30, 0.05) 0px, transparent 80px);
    box-shadow: inset 0 0 60px rgba(120, 80, 30, 0.10), inset 0 2px 6px rgba(120, 80, 30, 0.12);
    clip-path: polygon(
      0% 1%, 1% 0%, 6% 0.6%, 12% 0%, 18% 0.4%, 26% 0%, 34% 0.5%, 42% 0%, 50% 0.4%,
      58% 0%, 66% 0.5%, 74% 0%, 82% 0.4%, 88% 0%, 94% 0.5%, 99% 0%, 100% 1%,
      100% 99%, 99% 100%, 94% 99.5%, 88% 100%, 82% 99.6%, 74% 100%, 66% 99.5%,
      58% 100%, 50% 99.6%, 42% 100%, 34% 99.5%, 26% 100%, 18% 99.6%, 12% 100%,
      6% 99.4%, 1% 100%, 0% 99%
    );
  }
  .dispatch-seal { text-align: center; margin-bottom: 14px; line-height: 0; }
  @media (max-width: 540px) {
    .dispatch-body { padding: 22px 18px 26px; font-size: 16px; margin: 0; }
  }
  .body-callout {
    font-family: 'Crimson Text', 'Crimson Pro', Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: 1.15rem;
    line-height: 1.55;
    color: var(--gold-deep, #8a6a1c);
    text-align: center;
    padding: 14px 18px;
    margin: 0 auto;
    max-width: 640px;
    border-top: 1px solid rgba(201, 164, 76, 0.35);
    border-bottom: 1px solid rgba(201, 164, 76, 0.35);
  }
  .dispatch-date {
    font-style: italic;
    text-align: right;
    color: #5a3a14;
    margin-bottom: 18px;
  }
  .dispatch-p {
    margin: 0 0 14px;
    text-indent: 1.5em;
  }
  .dispatch-quote {
    font-style: italic;
    text-align: center;
    margin: 22px 12px 18px;
    color: #4a2c0e;
    border-top: 1px solid rgba(120, 90, 40, 0.25);
    border-bottom: 1px solid rgba(120, 90, 40, 0.25);
    padding: 12px 0;
  }
  .dispatch-sig {
    text-align: right;
    font-style: italic;
    margin-top: 14px;
    color: #4a2c0e;
  }

  .quiz-correct { background: rgba(122,139,90,0.15); border-color: #6f8a4a; }
  .quiz-wrong { background: rgba(155,34,38,0.10); border-color: var(--crimson); }
  .quiz-disabled { opacity: 0.55; cursor: not-allowed; }

  .tile { transition: transform .2s ease, box-shadow .25s ease, border-color .2s ease; position: relative; }
  .tile.active:hover { transform: translateY(-2px); }
  .tile.locked { opacity: 0.55; cursor: not-allowed; filter: saturate(0.55); }
  .lock-shimmer::after {
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(45deg, rgba(26,41,66,0.05) 0 10px, transparent 10px 20px);
    pointer-events:none; border-radius: inherit;
  }

  .wrap { max-width: 1100px; margin-inline: auto; padding-inline: 1rem; }
  .wrap-narrow { max-width: 780px; margin-inline: auto; padding-inline: 1rem; }
  @media (min-width: 768px) {
    .wrap { padding-inline: 2rem; }
    .wrap-narrow { padding-inline: 2rem; }
  }
  .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 2rem); }

  @keyframes fadeup { from { opacity:0; transform:translateY(8px);} to {opacity:1; transform:none;}}
  .fadeup { animation: fadeup .35s ease-out both; }

  .map-btn-mini {
    font-family:'Cinzel', Georgia, serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding: 4px 10px;
    border:1px solid var(--gold);
    border-radius: 6px;
    background: var(--parchment-warm);
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }
  .map-btn-mini:hover { background: var(--gold-light); }
  .map-btn-mini:active { transform: translateY(1px); }
  .map-btn-quest {
    font-family:'Cinzel', Georgia, serif;
    font-weight:700;
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding: 7px 14px;
    border:1px solid var(--crimson-deep);
    border-radius: 6px;
    background: var(--crimson);
    color: var(--parchment);
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }
  .map-btn-quest:hover { background: var(--crimson-deep); }
  .map-btn-quest:active { transform: translateY(1px); }
  .touch-none { touch-action: none; }
  @keyframes pop { 0% { transform:scale(0.5); opacity:0;} 60%{transform:scale(1.15);opacity:1;} 100%{transform:scale(1);} }
  .pop { animation:pop .4s ease-out; }
  @keyframes shake {
    0%,100%{transform:translateX(0);}
    20%,60%{transform:translateX(-4px);}
    40%,80%{transform:translateX(4px);}
  }
  .shake { animation:shake .4s ease-out; }
  @keyframes xpfly {
    0% { opacity:0; transform: translateX(-50%) scale(.4); }
    20% { opacity:1; transform: translateX(-50%) scale(1.1); }
    60% { opacity:1; transform: translateX(-50%) translateY(-10px) scale(1); }
    100% { opacity:0; transform: translateX(-50%) translateY(-80px) scale(.95); }
  }
  .xp-pop {
    position: fixed; left: 50%; top: 25%; transform: translateX(-50%);
    z-index: 50;
    background: var(--gold); color: var(--navy-deep);
    padding: .75rem 1.4rem; border-radius: 999px;
    font-family: 'Cinzel', serif; font-weight: 700; font-size: 1.1rem; letter-spacing: 0.05em;
    box-shadow: 0 12px 30px -8px rgba(15,26,44,.5);
    pointer-events: none; animation: xpfly 1.3s ease-out forwards;
    border: 2px solid var(--navy);
  }

  .sigil-sm { width: 36px; height: 36px; }
  .sigil-md { width: 56px; height: 56px; }
  .sigil-lg { width: 120px; height: 120px; }
  @media (min-width: 768px) { .sigil-lg { width: 160px; height: 160px; } }

  .griffin-emblem {
    width: 100%;
    max-width: 320px;
    height: auto;
    display: block;
    margin-inline: auto;
    filter:
      drop-shadow(0 8px 18px rgba(168, 133, 47, 0.35))
      drop-shadow(0 24px 48px rgba(15, 26, 44, 0.45));
  }
  @media (min-width: 640px) { .griffin-emblem { max-width: 440px; } }
  @media (min-width: 1024px) { .griffin-emblem { max-width: 520px; } }
</style>
</head>

<div id="root"></div>

    <!-- ============================================================
         HALL MASTER EMBLEMS — each is a single distinctive glyph on a
         gold-ringed navy roundel. Drawn as inert symbols; rendered via
         <use href="#emblem-..."/>. Easy to swap or recolor.

    <symbol id="emblem-orin" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="46" fill="#1a2942"/>

      <g fill="#c9a44c">

        <path d="M30 22 Q 50 18 70 22" stroke="#c9a44c" strokeWidth="3" fill="none"/>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

/* ============================================================
   AUDIO NARRATION — browser SpeechSynthesis API
   Per-Master voice picks. No backend, no API keys.
   iOS Safari requires user gesture before audio plays.
============================================================ */
const MASTER_VOICE_PREFS = {
  cassian:  { label:'Marshal Cassian',   pitch:0.85, rate:0.92, langPrefs:['en-GB','en-AU'],      namePrefs:['Daniel','Oliver','George','Arthur','Microsoft George','Google UK English Male'], fallbackGenderHint:'male' },
  mercator: { label:'Cartographer Mercator', pitch:0.78, rate:0.85, langPrefs:['en-GB','it-IT'], namePrefs:['Ralph','Luca','Stefan','Cosimo','Alessandro','Microsoft Stefan'],                fallbackGenderHint:'male' },
  aurelian: { label:'Sage Aurelian',     pitch:0.80, rate:0.88, langPrefs:['en-GB','en-US'],      namePrefs:['Daniel','Oliver','Reed','Microsoft David'],                                       fallbackGenderHint:'male' },
  sokrates: { label:'Thinker Sokrates',  pitch:0.95, rate:0.95, langPrefs:['en-GB','en-US'],      namePrefs:['Aaron','Microsoft Mark','Rishi'],                                                  fallbackGenderHint:'male' },
  orin:     { label:'Bard Orin',         pitch:1.05, rate:1.00, langPrefs:['en-GB','en-IE'],      namePrefs:['Oliver','Arthur','Microsoft Ryan'],                                                fallbackGenderHint:'male' },
  vellan:   { label:'Scribe Vellan',     pitch:0.88, rate:0.88, langPrefs:['en-GB','en-US'],      namePrefs:['Daniel','Microsoft David'],                                                        fallbackGenderHint:'male' },
  mira:     { label:'Linguist Mira',     pitch:1.05, rate:0.95, langPrefs:['en-GB','en-US'],      namePrefs:['Samantha','Karen','Microsoft Zira','Google UK English Female'],                    fallbackGenderHint:'female' },
  atlas:    { label:'Reckoner Atlas',    pitch:0.88, rate:0.90, langPrefs:['en-GB','en-US'],      namePrefs:['Microsoft Mark','Aaron','Daniel'],                                                 fallbackGenderHint:'male' },
  octavian: { label:'Statesman Octavian', pitch:0.90, rate:0.95, langPrefs:['en-GB','en-US'],      namePrefs:['Daniel','Microsoft David','Oliver'],                                               fallbackGenderHint:'male' },
  mercurius:{ label:'Merchant Mercurius',pitch:0.95, rate:0.95, langPrefs:['en-GB','en-US'],      namePrefs:['Daniel','Oliver','Microsoft David'],                                               fallbackGenderHint:'male' },
};

const FEMALE_NAME_HINTS = ['samantha','karen','zira','victoria','tessa','female','allison','susan','catherine','fiona','moira','serena'];

/* Pre-rendered ElevenLabs MP3s. When set, useNarration plays the file instead of
   browser SpeechSynthesis. Keys are master IDs; lesson MP3s live on lesson.audioUrl. */
const MASTER_INTRO_AUDIO = {
  cassian:  'audio/masters/cassian_intro.mp3',
  mercator: 'audio/masters/mercator_intro.mp3',
  aurelian: 'audio/masters/aurelian_intro.mp3',
  octavian: 'audio/masters/octavian_intro.mp3',
  atlas:    'audio/masters/atlas_intro.mp3',
};

const NARRATION_PREFS_KEY = 'griffin-hall:narration:v1';
const HUB_WELCOME_KEY     = 'griffin-hall:hub-welcomed:v1';

function loadNarrationPrefs() {
  try {
    const raw = localStorage.getItem(NARRATION_PREFS_KEY);
    if (!raw) return { rate: 0.9, volume: 1.0 };
    const p = JSON.parse(raw) || {};
    return { rate: typeof p.rate === 'number' ? p.rate : 0.9, volume: typeof p.volume === 'number' ? p.volume : 1.0 };
  } catch (e) { return { rate: 0.9, volume: 1.0 }; }
}
function saveNarrationPrefs(p) { try { localStorage.setItem(NARRATION_PREFS_KEY, JSON.stringify(p)); } catch (e) {} }

function scoreVoice(voice, prefs) {
  let score = 0;
  const lang = (voice.lang || '').toLowerCase();
  prefs.langPrefs.forEach((p, i) => {
    const lp = p.toLowerCase();
    if (lang === lp) score += 100 - i * 10;
    else if (lang.split('-')[0] === lp.split('-')[0]) score += 30 - i * 5;
  });
  const name = (voice.name || '').toLowerCase();
  prefs.namePrefs.forEach((n, i) => {
    if (name.includes(n.toLowerCase())) score += 50 - i * 5;
  });
  const looksFemale = FEMALE_NAME_HINTS.some(h => name.includes(h));
  if (prefs.fallbackGenderHint === 'male'   && !looksFemale) score += 5;
  if (prefs.fallbackGenderHint === 'female' &&  looksFemale) score += 5;
  if (voice.localService) score += 2;
  return score;
}
function pickVoice(voices, prefs) {
  if (!voices || !voices.length) return null;
  let best = null, bestScore = -Infinity;
  for (const v of voices) {
    const s = scoreVoice(v, prefs);
    if (s > bestScore) { bestScore = s; best = v; }
  }
  return best;
}

function useVoices() {
  const hasSS = typeof window !== 'undefined' && !!window.speechSynthesis;
  const [voices, setVoices] = useState(() => hasSS ? window.speechSynthesis.getVoices() : []);
  useEffect(() => {
    if (!hasSS) return;
    function refresh() { setVoices(window.speechSynthesis.getVoices()); }
    refresh();
    try { window.speechSynthesis.addEventListener('voiceschanged', refresh); }
    catch (e) { window.speechSynthesis.onvoiceschanged = refresh; }
    return () => {
      try { window.speechSynthesis.removeEventListener('voiceschanged', refresh); } catch (e) {}
    };
  }, []);
  return voices;
}

function useNarration(text, masterKey, audioUrl) {
  const voices = useVoices();
  const prefs  = MASTER_VOICE_PREFS[masterKey] || MASTER_VOICE_PREFS.cassian;
  const voice  = useMemo(() => pickVoice(voices, prefs), [voices, masterKey]);
  const [playing, setPlaying] = useState(false);
  const [paused,  setPaused]  = useState(false);
  const [userPrefs, setUserPrefs] = useState(loadNarrationPrefs);
  const audioRef = useRef(null);
  const hasSS = typeof window !== 'undefined' && !!window.speechSynthesis;
  const hasMp3 = !!audioUrl;
  const supported = hasMp3 || hasSS;
  const mode = hasMp3 ? 'mp3' : (hasSS ? 'tts' : 'none');

  function setRate(r)   { const np = { ...userPrefs, rate: r };   setUserPrefs(np); saveNarrationPrefs(np);
    if (audioRef.current) try { audioRef.current.playbackRate = Math.max(0.5, Math.min(2.0, r / 0.9)); } catch (e) {} }
  function setVolume(v) { const np = { ...userPrefs, volume: v }; setUserPrefs(np); saveNarrationPrefs(np);
    if (audioRef.current) try { audioRef.current.volume = Math.max(0, Math.min(1.0, v)); } catch (e) {} }

  function stopMp3() {
    const a = audioRef.current;
    if (a) { try { a.pause(); a.currentTime = 0; } catch (e) {} }
    setPlaying(false); setPaused(false);
  }
  function stop() {
    if (hasMp3) stopMp3();
    if (hasSS)  window.speechSynthesis.cancel();
    setPlaying(false); setPaused(false);
  }
  function play() {
    if (!supported) return;
    if (hasMp3) {
      // Stop any TTS that may be running
      if (hasSS) window.speechSynthesis.cancel();
      let a = audioRef.current;
      if (!a) {
        a = new Audio(audioUrl);
        audioRef.current = a;
        a.addEventListener('play',  () => { setPlaying(true);  setPaused(false); });
        a.addEventListener('pause', () => { setPaused(true); });
        a.addEventListener('ended', () => { setPlaying(false); setPaused(false); try { a.currentTime = 0; } catch (e) {} });
        a.addEventListener('error', () => { setPlaying(false); setPaused(false); });
      }
      try { a.currentTime = 0; } catch (e) {}
      try { a.playbackRate = Math.max(0.5, Math.min(2.0, (userPrefs.rate ?? 0.9) / 0.9)); } catch (e) {}
      try { a.volume = Math.max(0, Math.min(1.0, userPrefs.volume ?? 1)); } catch (e) {}
      const p = a.play();
      if (p && p.catch) p.catch(() => { setPlaying(false); setPaused(false); });
      return;
    }
    // Browser TTS fallback
    if (!text) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (voice) u.voice = voice;
    u.rate   = Math.max(0.5, Math.min(2.0, (prefs.rate ?? 0.9) * (userPrefs.rate / 0.9)));
    u.pitch  = Math.max(0,   Math.min(2.0,  prefs.pitch ?? 1));
    u.volume = Math.max(0,   Math.min(1.0,  userPrefs.volume));
    u.onstart = () => { setPlaying(true); setPaused(false); };
    u.onend   = () => { setPlaying(false); setPaused(false); };
    u.onerror = () => { setPlaying(false); setPaused(false); };
    window.speechSynthesis.speak(u);
  }
  function pauseResume() {
    if (hasMp3) {
      const a = audioRef.current;
      if (!a) return;
      if (a.paused) { const p = a.play(); if (p && p.catch) p.catch(()=>{}); setPaused(false); }
      else          { a.pause(); setPaused(true); }
      return;
    }
    if (!hasSS) return;
    if (paused) { window.speechSynthesis.resume(); setPaused(false); }
    else        { window.speechSynthesis.pause();  setPaused(true); }
  }

  // Auto-stop when this component unmounts (e.g. navigating away from lesson)
  useEffect(() => () => {
    if (hasSS) try { window.speechSynthesis.cancel(); } catch (e) {}
    if (audioRef.current) try { audioRef.current.pause(); } catch (e) {}
  }, []);

  return { play, stop, pauseResume, playing, paused, voice, voices, prefs: userPrefs, setRate, setVolume, supported, mode };
}

function buildLessonNarration(lesson, masterKey) {
  const m = MASTERS[masterKey];
  const out = [];
  out.push(lesson.title + '.');
  if (lesson.subtitle) out.push(lesson.subtitle + '.');
  if (lesson.cassianIntro) out.push(`${m ? m.name : 'The Master'} says: ${lesson.cassianIntro}`);
  if (lesson.story) lesson.story.forEach(p => out.push(p));
  if (lesson.principle) {
    out.push('The principle. ' + lesson.principle.title + '.');
    out.push(lesson.principle.body);
    if (lesson.principle.quote) out.push(lesson.principle.quote);
  }
  if (lesson.modern) {
    out.push(lesson.modern.title);
    out.push(lesson.modern.body);
  }
  return out.join(' ');
}

function NarrationPanel({ text, masterKey, label, audioUrl }) {
  const n = useNarration(text, masterKey, audioUrl);
  if (!n.supported) return null;
  const voiceName = n.mode === 'mp3'
    ? 'studio narration'
    : (n.voice ? (n.voice.name + (n.voice.lang ? ' · ' + n.voice.lang : '')) : 'default voice');
  return (
    <div className="card p-4 sm:p-5" style={{ borderLeft:'3px solid var(--crimson)' }}>
      <div className="flex flex-wrap items-center gap-3">
        {!n.playing ? (
          <button onClick={n.play}
            className="bg-crimson text-parchment heraldic font-bold uppercase tracking-widest text-sm px-5 py-2.5 rounded-lg hover:brightness-110">
            🔊 Listen
          </button>
        ) : (
          <>
            <button onClick={n.pauseResume}
              className="bg-navy text-parchment heraldic font-bold uppercase tracking-widest text-sm px-4 py-2.5 rounded-lg hover:brightness-110">
              {n.paused ? '▶ Resume' : '⏸ Pause'}
            </button>
            <button onClick={n.stop}
              className="bg-parchment-deep ink heraldic font-bold uppercase tracking-widest text-sm px-4 py-2.5 rounded-lg border border-ink-soft/40">
              ■ Stop
            </button>
          </>
        )}
        {n.playing && !n.paused && (
          <div className="heraldic text-[10px] text-gold-deep uppercase tracking-[0.25em] font-bold animate-pulse">
            {(label || 'Master')} is speaking…
          </div>
        )}
      </div>
      <div className="mt-3 grid sm:grid-cols-2 gap-2">
        <label className="text-xs ink-soft flex items-center gap-2">
          <span className="heraldic uppercase tracking-widest font-bold w-12">Speed</span>
          <select value={n.prefs.rate}
            onChange={e => n.setRate(parseFloat(e.target.value))}
            className="bg-parchment border border-ink-soft/40 rounded px-2 py-1 text-sm flex-1">
            <option value="0.7">0.7×</option>
            <option value="0.85">0.85×</option>
            <option value="0.9">0.9× (default)</option>
            <option value="1">1.0×</option>
            <option value="1.15">1.15×</option>
          </select>
        </label>
        <label className="text-xs ink-soft flex items-center gap-2">
          <span className="heraldic uppercase tracking-widest font-bold w-12">Vol</span>
          <select value={n.prefs.volume}
            onChange={e => n.setVolume(parseFloat(e.target.value))}
            className="bg-parchment border border-ink-soft/40 rounded px-2 py-1 text-sm flex-1">
            <option value="0.25">25%</option>
            <option value="0.5">50%</option>
            <option value="0.75">75%</option>
            <option value="1">100%</option>
          </select>
        </label>
      </div>
      <div className="text-[10px] ink-muted mt-2 italic">Voice: {voiceName}</div>
    </div>
  );
}

function HallDoorAutoplay({ masterKey, text, audioUrl }) {
  const n = useNarration(text, masterKey, audioUrl);
  const triedRef = useRef(false);
  useEffect(() => {
    if (!n.supported || triedRef.current) return;
    triedRef.current = true;
    // The click that hash-routed into the Quest counts as the user gesture on iOS.
    const t = setTimeout(() => { n.play(); }, 400);
    return () => clearTimeout(t);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [masterKey]);
  if (!n.supported) return null;
  return (
    <div className="flex justify-center mt-4">
      {!n.playing ? (
        <button onClick={n.play}
          className="bg-crimson text-parchment heraldic font-bold uppercase tracking-widest text-xs px-4 py-2 rounded-lg hover:brightness-110">
          🔊 Hear the Master
        </button>

        <button onClick={n.stop}
          className="bg-navy text-parchment heraldic font-bold uppercase tracking-widest text-xs px-4 py-2 rounded-lg hover:brightness-110">
          ■ Silence the Master
        </button>
      )}
    </div>
  );
}

function HubWelcomeOnce() {
  const text = "Welcome to Griffin Hall. Many doors await. Some are open. Some are sealed. Choose wisely.";
  const n = useNarration(text, 'cassian');
  useEffect(() => {
    if (!n.supported) return;
    try {
      if (localStorage.getItem(HUB_WELCOME_KEY)) return;
    } catch (e) { return; }
    function onFirstInteract() {
      try { localStorage.setItem(HUB_WELCOME_KEY, '1'); } catch (e) {}
      n.play();
      cleanup();
    }
    function cleanup() {
      window.removeEventListener('click',    onFirstInteract);
      window.removeEventListener('touchend', onFirstInteract);
      window.removeEventListener('keydown',  onFirstInteract);
    }
    window.addEventListener('click',    onFirstInteract, { once: true });
    window.addEventListener('touchend', onFirstInteract, { once: true });
    window.addEventListener('keydown',  onFirstInteract, { once: true });
    return cleanup;
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  return null;
}

const MASTERY_THRESHOLD = 0.8;
const REPLAY_DAYS = 7;
const XP_CORRECT = 10;
const XP_RETRY_CORRECT = 5;
const XP_LESSON_BONUS = 50;
const XP_MASTERY_BONUS = 50;
const XP_DRILL_CORRECT = 5;

const STATE_KEY = 'griffin-hall:state:v1';

function defaultState() {
  return {
    name: 'E',
    xp: 0,
    streak: { last: null, count: 0 },
    quests: { strategy: { lessons: {} }, cartography: { lessons: {} }, philosophy: { lessons: {} }, statecraft: { lessons: {} }, reckoning: { lessons: {} } },
    reviewQueue: [],
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) {
      const old = localStorage.getItem('learning-hub:state:v2');
      if (old) {
        const o = JSON.parse(old);
        return {
          name: o.name || 'E',
          xp: o.xp || 0,
          streak: o.streak || { last:null, count:0 },
          quests: { strategy: o.subjects?.strategy || { lessons: {} }, cartography: { lessons: {} } },
          reviewQueue: (o.reviewQueue || []).map(r => ({ ...r, quest: r.subject || 'strategy' })),
        };
      }
      return defaultState();
    }
    const parsed = JSON.parse(raw);
    return { ...defaultState(), ...parsed, quests: { ...defaultState().quests, ...(parsed.quests||{}) } };
  } catch (e) { return defaultState(); }
}
function saveState(s) {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(s)); } catch (e) {}
}
function todayISO() { return new Date().toISOString().slice(0,10); }
function yesterdayISO() { return new Date(Date.now() - 86400000).toISOString().slice(0,10); }
function daysBetween(isoA, isoB) {
  return Math.floor((new Date(isoB).getTime() - new Date(isoA).getTime()) / 86400000);
}
function tickStreak(s) {
  const today = todayISO();
  if (s.streak.last === today) return s;
  const count = (s.streak.last === yesterdayISO()) ? (s.streak.count + 1) : 1;
  return { ...s, streak: { last: today, count } };
}
function activeStreak(s) {
  const today = todayISO(); const yest = yesterdayISO();
  if (s.streak.last === today || s.streak.last === yest) return s.streak.count;
  return 0;
}
function getLessonState(state, questId, lessonId) {
  return state.quests?.[questId]?.lessons?.[lessonId] || { attempts:{}, firstTryCorrect:0, totalQ:0, completedAt:null, bestMastery:0, replays:0 };
}
function isLessonMastered(state, questId, lessonId) {
  return getLessonState(state, questId, lessonId).bestMastery >= MASTERY_THRESHOLD;
}
function isLessonUnlocked(state, questId, lessonId) {
  const quest = QUESTS[questId];
  if (!quest) return false;
  const idx = quest.lessons.findIndex(l => l.id === lessonId);
  if (idx <= 0) return true;
  return isLessonMastered(state, questId, quest.lessons[idx - 1].id);
}
function canReplayForBonus(state, questId, lessonId) {
  const ls = getLessonState(state, questId, lessonId);
  if (!ls.completedAt) return false;
  return daysBetween(ls.completedAt.slice(0,10), todayISO()) >= REPLAY_DAYS;
}
function findQuestionById(questId, lessonId, qIdx) {
  const quest = QUESTS[questId];
  if (!quest) return null;
  const lesson = quest.lessons.find(l => l.id === lessonId);
  if (!lesson) return null;
  return { lesson, q: lesson.quiz[qIdx], qIdx };
}

function QuizQuestion({ q, qIdx, onCorrect, onWrong, onPicked }) {
  const [picked, setPicked] = useState(null);
  const [locked, setLocked] = useState(false);
  const [resolved, setResolved] = useState(false);
  const [tries, setTries] = useState(0);
  const containerRef = useRef(null);
  function reset() { setPicked(null); setLocked(false); }
  function choose(i) {
    if (locked || resolved) return;
    setPicked(i); setLocked(true);
    const wasCorrect = i === q.correct;
    const newTries = tries + 1;
    setTries(newTries);
    if (onPicked) onPicked(i, wasCorrect, newTries);
    if (wasCorrect) {
      setResolved(true);
      if (onCorrect) onCorrect(newTries);
    } else {
      if (onWrong) onWrong(newTries);
      if (containerRef.current) {
        containerRef.current.classList.remove('shake');
        // eslint-disable-next-line no-unused-expressions
        containerRef.current.offsetWidth;
        containerRef.current.classList.add('shake');
      }
    }
  }
  return (
    <div ref={containerRef} className="card p-5 fadeup">
      <div className="flex items-baseline justify-between mb-1">
        <div className="heraldic text-[10px] font-bold text-gold-deep uppercase tracking-[0.25em]">Question {qIdx+1}</div>
        {tries > 0 && (<div className="text-xs ink-muted">Attempt {tries}{resolved && tries === 1 ? ' · first try' : ''}</div>)}
      </div>
      <div className="font-display text-2xl leading-snug mb-4 ink">{q.q}</div>
      <div className="grid gap-2">
        {q.choices.map((c, i) => {
          let cls = "text-left px-4 py-3 rounded-lg border bg-parchment transition flex items-start gap-3 border-ink-soft/30";
          if (locked || resolved) {
            if (resolved && i === q.correct) cls += " quiz-correct";
            else if (i === picked && i !== q.correct) cls += " quiz-wrong";
            else cls += " quiz-disabled";
          } else { cls += " hover:border-navy"; }
          return (
            <button key={i} disabled={locked || resolved} onClick={() => choose(i)} className={cls}>
              <span className="heraldic font-bold ink-soft w-6 shrink-0">{String.fromCharCode(65+i)}</span>
              <span className="ink flex-1">{c}</span>
              {(locked || resolved) && i === q.correct && <Icon.Check className="w-5 h-5 shrink-0" style={{ color:'#6f8a4a' }}/>}
            </button>
          );
        })}
      </div>
      {locked && !resolved && (
        <div className="mt-3 fadeup">
          <div className="text-sm ink-soft border-l-2 border-crimson pl-3 italic">
            Not yet — and that's fine. {q.explain}
          </div>
          <button onClick={reset} className="mt-3 inline-flex items-center gap-2 bg-crimson text-parchment heraldic font-bold px-4 py-2 rounded-lg uppercase tracking-widest text-sm hover:brightness-110">
            <Icon.Refresh className="w-4 h-4"/> Try Again
          </button>
        </div>
      )}
      {resolved && (
        <div className="mt-3 text-sm ink-soft border-l-2 pl-3 italic fadeup" style={{ borderColor:'#6f8a4a' }}>
          {q.explain}
        </div>
      )}
    </div>
  );
}

function normalize(s) {
  return (s || '').toString().trim().toLowerCase().replace(/[.’']/g, '').replace(/\s+/g, ' ');
}

function TypeDrillBlock({ drill, onCorrect }) {
  const items = drill.items || [];
  const [pos, setPos] = useState(0);
  const [value, setValue] = useState('');
  const [status, setStatus] = useState('idle'); // idle | wrong | right | skipped
  const [doneSet, setDoneSet] = useState(() => new Set());
  const inputRef = useRef(null);

  if (items.length === 0) return null;
  const finished = pos >= items.length;
  const cur = items[pos];

  function check(e) {
    e?.preventDefault?.();
    if (finished || !cur) return;
    const a = normalize(value);
    const accepted = [cur.answer, ...(cur.aliases || [])].map(normalize);
    if (accepted.includes(a)) {
      const wasFirst = status === 'idle';
      setStatus('right');
      setDoneSet(prev => { const ns = new Set(prev); ns.add(pos); return ns; });
      if (wasFirst && onCorrect) onCorrect();
      setTimeout(() => {
        setValue('');
        setStatus('idle');
        setPos(p => p + 1);
        setTimeout(() => inputRef.current?.focus(), 30);
      }, 450);
    } else {
      setStatus('wrong');
      if (inputRef.current) {
        inputRef.current.classList.remove('shake');
        // eslint-disable-next-line no-unused-expressions
        inputRef.current.offsetWidth;
        inputRef.current.classList.add('shake');
      }
    }
  }
  function reveal() {
    setStatus('shown');
  }
  function next() {
    setValue('');
    setStatus('idle');
    setPos(p => p + 1);
    setTimeout(() => inputRef.current?.focus(), 30);
  }
  function restart() {
    setPos(0); setValue(''); setStatus('idle'); setDoneSet(new Set());
    setTimeout(() => inputRef.current?.focus(), 30);
  }

  const firstTryRight = doneSet.size;
  const pct = Math.round((pos / items.length) * 100);

  return (
    <div className="card p-5 sm:p-6 fadeup" style={{ borderLeft:'3px solid var(--gold)' }}>
      <div className="heraldic text-[10px] font-bold text-gold-deep uppercase tracking-[0.25em]">Practice Drill</div>
      <h2 className="font-display text-3xl ink mt-1">{drill.title || 'Drill'}</h2>
      {drill.intro && <p className="ink-soft mt-2 leading-relaxed">{drill.intro}</p>}
      <div className="mt-4 h-1.5 bg-parchment-deep rounded-full overflow-hidden border border-ink-soft/30">
        <div className="h-full progress-bar transition-all duration-500" style={{ width: pct + '%' }}/>
      </div>
      <div className="flex justify-between mt-1 text-[11px] heraldic uppercase tracking-widest ink-soft">
        <span>{pos}/{items.length} done</span>
        <span>{firstTryRight} first-try wins</span>
      </div>

      {finished ? (
        <div className="mt-6 text-center">
          <div className="font-display text-3xl ink">Drill complete.</div>
          <div className="ink-soft mt-2">First-try wins: <span className="font-bold ink">{firstTryRight}</span> of {items.length} ({Math.round(firstTryRight/items.length*100)}%)</div>
          <button onClick={restart} className="mt-5 inline-flex items-center gap-2 bg-navy text-parchment heraldic font-bold uppercase tracking-widest text-sm px-5 py-2.5 rounded-lg hover:brightness-110">
            <Icon.Refresh className="w-4 h-4"/> Run it again
          </button>
        </div>
      ) : (
        <form onSubmit={check} className="mt-5">
          <div className="text-sm heraldic uppercase tracking-widest text-gold-deep font-bold">Item {pos+1} of {items.length}</div>
          <div className="font-display text-2xl ink mt-1 leading-snug">{cur.prompt}</div>
          <div className="mt-3 flex flex-wrap gap-2">
            <input
              ref={inputRef}
              value={value}
              onChange={(e) => { setValue(e.target.value); if (status === 'wrong') setStatus('idle'); }}
              autoComplete="off" autoCorrect="off" spellCheck="false"
              placeholder="Type your answer…"
              className={"flex-1 min-w-[200px] px-4 py-3 rounded-lg border bg-parchment ink text-lg outline-none transition " + (status==='wrong' ? "border-crimson" : status==='right' ? "border-green-700" : "border-ink-soft/40 focus:border-navy")}
            />
            <button type="submit" className="bg-navy text-parchment heraldic font-bold uppercase tracking-widest text-sm px-5 py-3 rounded-lg hover:brightness-110">Check</button>
            <button type="button" onClick={reveal} className="card heraldic font-bold uppercase tracking-widest text-xs px-4 py-3 rounded-lg ink hover:bg-parchment-deep">Show answer</button>
          </div>
          {status === 'wrong' && (
            <div className="mt-3 text-sm text-crimson border-l-2 border-crimson pl-3 italic fadeup">
              Not quite. Try again — or tap "Show answer" if you want a peek.
            </div>
          )}
          {status === 'shown' && (
            <div className="mt-3 fadeup">
              <div className="text-sm ink-soft border-l-2 border-gold pl-3">
                Answer: <span className="font-bold ink">{cur.answer}</span>
              </div>
              <button type="button" onClick={next} className="mt-3 inline-flex items-center gap-2 bg-crimson text-parchment heraldic font-bold uppercase tracking-widest text-sm px-4 py-2 rounded-lg hover:brightness-110">
                <Icon.Refresh className="w-4 h-4"/> Next item
              </button>
            </div>
          )}
          {status === 'right' && (
            <div className="mt-3 text-sm border-l-2 pl-3 italic fadeup" style={{ borderColor:'#6f8a4a', color:'#3f6020' }}>
              Yes — <span className="font-bold">{cur.answer}</span>.
            </div>
          )}
        </form>
      )}
    </div>
  );
}

function CardsBlock({ cards }) {
  if (!cards || cards.length === 0) return null;
  return (
    <div className="space-y-4">
      {cards.map((c, i) => (
        <div key={i} className="card p-5 sm:p-6 fadeup" style={{ borderLeft:'3px solid var(--gold)', animationDelay:(i*60)+'ms' }}>
          <div className="font-display text-2xl ink leading-tight">{c.title}</div>
          {c.subtitle && (
            <div className="heraldic text-[10px] font-bold text-gold-deep uppercase tracking-[0.25em] mt-1">{c.subtitle}</div>
          )}
          {c.body && (Array.isArray(c.body) ? c.body : [c.body]).map((p, j) => (
            <p key={j} className="ink leading-relaxed mt-2">{p}</p>
          ))}
          {c.kv && (
            <dl className="mt-4 space-y-3">
              {c.kv.map((kv, j) => (
                <div key={j} className="grid grid-cols-1 sm:grid-cols-[10rem_1fr] gap-1 sm:gap-4">
                  <dt className="heraldic text-[11px] font-bold text-gold-deep uppercase tracking-[0.2em] sm:pt-1">{kv.label}</dt>
                  <dd className="ink text-sm sm:text-base leading-relaxed">{kv.body}</dd>
                </div>
              ))}
            </dl>
          )}
        </div>
      ))}
    </div>
  );
}

  { id:'AL', name:'Alabama',        capital:'Montgomery',    region:'South',     col:7,  row:5, econ:'Auto manufacturing (Mercedes, Honda), aerospace (NASA Marshall).' },
  { id:'GA', name:'Georgia',        capital:'Atlanta',       region:'South',     col:8,  row:5, econ:'Coca-Cola, Delta, CNN, peaches, ports (Savannah).' },
  { id:'SC', name:'South Carolina', capital:'Columbia',      region:'South',     col:8,  row:6, econ:'BMW plant, Boeing, ports, tourism.' },
