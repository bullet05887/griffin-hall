    --crimson: #9b2226;

    --ink: #1a2942;

  .border-navy { border-color: var(--navy); }

  .border-gold-soft { border-color: rgba(201,164,76,0.5); }

  .card {
    background: var(--parchment-warm);

  .gold-line {
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    height: 1px;
  }
  .gold-line-strong {
    background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
    height: 2px;
  }

  .progress-bar { background: linear-gradient(90deg, var(--crimson) 0%, var(--gold) 100%); }

      0 0 0 7px var(--gold),
      0 0 0 11px var(--parchment),

    border-left: 4px solid var(--gold);
    border-radius: 0 12px 12px 0;

    background: linear-gradient(180deg, rgba(155,34,38,0.10) 0%, rgba(155,34,38,0.02) 100%);
    border-left: 4px solid var(--crimson);
    border-radius: 0 12px 12px 0;

  .quiz-wrong { background: rgba(155,34,38,0.10); border-color: var(--crimson); }
  .quiz-disabled { opacity: 0.55; cursor: not-allowed; }

  .tile { transition: transform .2s ease, box-shadow .25s ease, border-color .2s ease; position: relative; }
  .tile.active:hover { transform: translateY(-2px); }
  .tile.locked { opacity: 0.55; cursor: not-allowed; filter: saturate(0.55); }
  .lock-shimmer::after {
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(45deg, rgba(26,41,66,0.05) 0 10px, transparent 10px 20px);
    pointer-events:none; border-radius: inherit;
  }

  .wrap-narrow { max-width: 780px; margin-inline: auto; padding-inline: 1rem; }
  @media (min-width: 768px) {

    .wrap-narrow { padding-inline: 2rem; }

  @keyframes fadeup { from { opacity:0; transform:translateY(8px);} to {opacity:1; transform:none;}}

  @keyframes pop { 0% { transform:scale(0.5); opacity:0;} 60%{transform:scale(1.15);opacity:1;} 100%{transform:scale(1);} }
  .pop { animation:pop .4s ease-out; }
  @keyframes shake {
    0%,100%{transform:translateX(0);}
    20%,60%{transform:translateX(-4px);}
    40%,80%{transform:translateX(4px);}
  }
  .shake { animation:shake .4s ease-out; }
  @keyframes xpfly {
    0% { opacity:0; transform: translateX(-50%) scale(.4); }
    20% { opacity:1; transform: translateX(-50%) scale(1.1); }
    60% { opacity:1; transform: translateX(-50%) translateY(-10px) scale(1); }
    100% { opacity:0; transform: translateX(-50%) translateY(-80px) scale(.95); }
  }
  .xp-pop {
    position: fixed; left: 50%; top: 25%; transform: translateX(-50%);
    z-index: 50;
    background: var(--gold); color: var(--navy-deep);
    padding: .75rem 1.4rem; border-radius: 999px;

    box-shadow: 0 12px 30px -8px rgba(15,26,44,.5);
    pointer-events: none; animation: xpfly 1.3s ease-out forwards;
    border: 2px solid var(--navy);
  }

const FEMALE_NAME_HINTS = ['samantha','karen','zira','victoria','tessa','female','allison','susan','catherine','fiona','moira','serena'];

const NARRATION_PREFS_KEY = 'griffin-hall:narration:v1';
const HUB_WELCOME_KEY     = 'griffin-hall:hub-welcomed:v1';

function loadNarrationPrefs() {
  try {
    const raw = localStorage.getItem(NARRATION_PREFS_KEY);
    if (!raw) return { rate: 0.9, volume: 1.0 };
    const p = JSON.parse(raw) || {};
    return { rate: typeof p.rate === 'number' ? p.rate : 0.9, volume: typeof p.volume === 'number' ? p.volume : 1.0 };
  } catch (e) { return { rate: 0.9, volume: 1.0 }; }
}
function saveNarrationPrefs(p) { try { localStorage.setItem(NARRATION_PREFS_KEY, JSON.stringify(p)); } catch (e) {} }

function scoreVoice(voice, prefs) {
  let score = 0;
  const lang = (voice.lang || '').toLowerCase();
  prefs.langPrefs.forEach((p, i) => {
    const lp = p.toLowerCase();
    if (lang === lp) score += 100 - i * 10;
    else if (lang.split('-')[0] === lp.split('-')[0]) score += 30 - i * 5;
  });
  const name = (voice.name || '').toLowerCase();
  prefs.namePrefs.forEach((n, i) => {
    if (name.includes(n.toLowerCase())) score += 50 - i * 5;
  });
  const looksFemale = FEMALE_NAME_HINTS.some(h => name.includes(h));
  if (prefs.fallbackGenderHint === 'male'   && !looksFemale) score += 5;
  if (prefs.fallbackGenderHint === 'female' &&  looksFemale) score += 5;
  if (voice.localService) score += 2;
  return score;
}
function pickVoice(voices, prefs) {
  if (!voices || !voices.length) return null;
  let best = null, bestScore = -Infinity;
  for (const v of voices) {
    const s = scoreVoice(v, prefs);
    if (s > bestScore) { bestScore = s; best = v; }
  }
  return best;
}

function useVoices() {
  const hasSS = typeof window !== 'undefined' && !!window.speechSynthesis;
  const [voices, setVoices] = useState(() => hasSS ? window.speechSynthesis.getVoices() : []);
  useEffect(() => {
    if (!hasSS) return;
    function refresh() { setVoices(window.speechSynthesis.getVoices()); }
    refresh();
    try { window.speechSynthesis.addEventListener('voiceschanged', refresh); }
    catch (e) { window.speechSynthesis.onvoiceschanged = refresh; }
    return () => {
      try { window.speechSynthesis.removeEventListener('voiceschanged', refresh); } catch (e) {}
    };
  }, []);
  return voices;
}

function useNarration(text, masterKey) {
  const voices = useVoices();
  const prefs  = MASTER_VOICE_PREFS[masterKey] || MASTER_VOICE_PREFS.cassian;
  const voice  = useMemo(() => pickVoice(voices, prefs), [voices, masterKey]);
  const [playing, setPlaying] = useState(false);
  const [paused,  setPaused]  = useState(false);
  const [userPrefs, setUserPrefs] = useState(loadNarrationPrefs);
  const supported = typeof window !== 'undefined' && !!window.speechSynthesis;

  function setRate(r)   { const np = { ...userPrefs, rate: r };   setUserPrefs(np); saveNarrationPrefs(np); }
  function setVolume(v) { const np = { ...userPrefs, volume: v }; setUserPrefs(np); saveNarrationPrefs(np); }

  function stop() {
    if (!supported) return;
    window.speechSynthesis.cancel();
    setPlaying(false); setPaused(false);
  }
  function play() {
    if (!supported || !text) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (voice) u.voice = voice;
    // Combine master's natural rate with user's speed multiplier (default 0.9× = 1× of master)
    u.rate   = Math.max(0.5, Math.min(2.0, (prefs.rate ?? 0.9) * (userPrefs.rate / 0.9)));
    u.pitch  = Math.max(0,   Math.min(2.0,  prefs.pitch ?? 1));
    u.volume = Math.max(0,   Math.min(1.0,  userPrefs.volume));
    u.onstart = () => { setPlaying(true); setPaused(false); };
    u.onend   = () => { setPlaying(false); setPaused(false); };
    u.onerror = () => { setPlaying(false); setPaused(false); };
    window.speechSynthesis.speak(u);
  }
  function pauseResume() {
    if (!supported) return;
    if (paused) { window.speechSynthesis.resume(); setPaused(false); }
    else        { window.speechSynthesis.pause();  setPaused(true); }
  }

  // Auto-stop when this component unmounts (e.g. navigating away from lesson)
  useEffect(() => () => { if (supported) window.speechSynthesis.cancel(); }, []);

  return { play, stop, pauseResume, playing, paused, voice, voices, prefs: userPrefs, setRate, setVolume, supported };
}

function buildLessonNarration(lesson, masterKey) {
  const m = MASTERS[masterKey];
  const out = [];
  out.push(lesson.title + '.');
  if (lesson.subtitle) out.push(lesson.subtitle + '.');
  if (lesson.cassianIntro) out.push(`${m ? m.name : 'The Master'} says: ${lesson.cassianIntro}`);
  if (lesson.story) lesson.story.forEach(p => out.push(p));
  if (lesson.principle) {
    out.push('The principle. ' + lesson.principle.title + '.');
    out.push(lesson.principle.body);
    if (lesson.principle.quote) out.push(lesson.principle.quote);
  }
  if (lesson.modern) {
    out.push(lesson.modern.title);
    out.push(lesson.modern.body);
  }
  return out.join(' ');
}

function HallDoorAutoplay({ masterKey, text }) {
  const n = useNarration(text, masterKey);
  const triedRef = useRef(false);
  useEffect(() => {
    if (!n.supported || triedRef.current) return;
    triedRef.current = true;
    // The click that hash-routed into the Quest counts as the user gesture on iOS.
    const t = setTimeout(() => { n.play(); }, 400);
    return () => clearTimeout(t);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [masterKey]);
  if (!n.supported) return null;
  return (
    <div className="flex justify-center mt-4">
      {!n.playing ? (
        <button onClick={n.play}
          className="bg-crimson text-parchment heraldic font-bold uppercase tracking-widest text-xs px-4 py-2 rounded-lg hover:brightness-110">
          🔊 Hear the Master
        </button>
      ) : (
        <button onClick={n.stop}
          className="bg-navy text-parchment heraldic font-bold uppercase tracking-widest text-xs px-4 py-2 rounded-lg hover:brightness-110">
          ■ Silence the Master
        </button>
      )}
    </div>
  );
}

function HubWelcomeOnce() {
  const text = "Welcome to Griffin Hall. Many doors await. Some are open. Some are sealed. Choose wisely.";
  const n = useNarration(text, 'cassian');
  useEffect(() => {
    if (!n.supported) return;
    try {
      if (localStorage.getItem(HUB_WELCOME_KEY)) return;
    } catch (e) { return; }
    function onFirstInteract() {
      try { localStorage.setItem(HUB_WELCOME_KEY, '1'); } catch (e) {}
      n.play();
      cleanup();
    }
    function cleanup() {
      window.removeEventListener('click',    onFirstInteract);
      window.removeEventListener('touchend', onFirstInteract);
      window.removeEventListener('keydown',  onFirstInteract);
    }
    window.addEventListener('click',    onFirstInteract, { once: true });
    window.addEventListener('touchend', onFirstInteract, { once: true });
    window.addEventListener('keydown',  onFirstInteract, { once: true });
    return cleanup;
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  return null;
}

const MASTERY_THRESHOLD = 0.8;
const REPLAY_DAYS = 7;
const XP_CORRECT = 10;
const XP_RETRY_CORRECT = 5;
const XP_LESSON_BONUS = 50;
const XP_MASTERY_BONUS = 50;
const XP_DRILL_CORRECT = 5;

const STATE_KEY = 'griffin-hall:state:v1';

function defaultState() {
  return {
    name: 'E',
    xp: 0,
    streak: { last: null, count: 0 },
    quests: { strategy: { lessons: {} } },
    reviewQueue: [],
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) {
      const old = localStorage.getItem('learning-hub:state:v2');
      if (old) {
        const o = JSON.parse(old);
        return {
          name: o.name || 'E',
          xp: o.xp || 0,
          streak: o.streak || { last:null, count:0 },
          quests: { strategy: o.subjects?.strategy || { lessons: {} } },
          reviewQueue: (o.reviewQueue || []).map(r => ({ ...r, quest: r.subject || 'strategy' })),
        };
      }
      return defaultState();
    }
    const parsed = JSON.parse(raw);
    return { ...defaultState(), ...parsed, quests: { ...defaultState().quests, ...(parsed.quests||{}) } };
  } catch (e) { return defaultState(); }
}
function saveState(s) {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(s)); } catch (e) {}
}
function todayISO() { return new Date().toISOString().slice(0,10); }
function yesterdayISO() { return new Date(Date.now() - 86400000).toISOString().slice(0,10); }
function daysBetween(isoA, isoB) {
  return Math.floor((new Date(isoB).getTime() - new Date(isoA).getTime()) / 86400000);
}
function tickStreak(s) {
  const today = todayISO();
  if (s.streak.last === today) return s;
  const count = (s.streak.last === yesterdayISO()) ? (s.streak.count + 1) : 1;
  return { ...s, streak: { last: today, count } };
}
function activeStreak(s) {
  const today = todayISO(); const yest = yesterdayISO();
  if (s.streak.last === today || s.streak.last === yest) return s.streak.count;
  return 0;
}
function getLessonState(state, questId, lessonId) {
  return state.quests?.[questId]?.lessons?.[lessonId] || { attempts:{}, firstTryCorrect:0, totalQ:0, completedAt:null, bestMastery:0, replays:0 };
}
function isLessonMastered(state, questId, lessonId) {
  return getLessonState(state, questId, lessonId).bestMastery >= MASTERY_THRESHOLD;
}
function isLessonUnlocked(state, questId, lessonId) {
  const quest = QUESTS[questId];
  if (!quest) return false;
  const idx = quest.lessons.findIndex(l => l.id === lessonId);
  if (idx <= 0) return true;
  return isLessonMastered(state, questId, quest.lessons[idx - 1].id);
}
function canReplayForBonus(state, questId, lessonId) {
  const ls = getLessonState(state, questId, lessonId);
  if (!ls.completedAt) return false;
  return daysBetween(ls.completedAt.slice(0,10), todayISO()) >= REPLAY_DAYS;
}
function findQuestionById(questId, lessonId, qIdx) {
  const quest = QUESTS[questId];
  if (!quest) return null;
  const lesson = quest.lessons.find(l => l.id === lessonId);
  if (!lesson) return null;
  return { lesson, q: lesson.quiz[qIdx], qIdx };
}

function QuizQuestion({ q, qIdx, onCorrect, onWrong, onPicked }) {
  const [picked, setPicked] = useState(null);
  const [locked, setLocked] = useState(false);
  const [resolved, setResolved] = useState(false);
  const [tries, setTries] = useState(0);
  const containerRef = useRef(null);
  function reset() { setPicked(null); setLocked(false); }
  function choose(i) {
    if (locked || resolved) return;
    setPicked(i); setLocked(true);
    const wasCorrect = i === q.correct;
    const newTries = tries + 1;
    setTries(newTries);
    if (onPicked) onPicked(i, wasCorrect, newTries);
    if (wasCorrect) {
      setResolved(true);
      if (onCorrect) onCorrect(newTries);
    } else {
      if (onWrong) onWrong(newTries);
      if (containerRef.current) {
        containerRef.current.classList.remove('shake');
        // eslint-disable-next-line no-unused-expressions
        containerRef.current.offsetWidth;
        containerRef.current.classList.add('shake');
      }
    }
  }
  return (
    <div ref={containerRef} className="card p-5 fadeup">
      <div className="flex items-baseline justify-between mb-1">
        <div className="heraldic text-[10px] font-bold text-gold-deep uppercase tracking-[0.25em]">Question {qIdx+1}</div>
        {tries > 0 && (<div className="text-xs ink-muted">Attempt {tries}{resolved && tries === 1 ? ' · first try' : ''}</div>)}
      </div>
      <div className="font-display text-2xl leading-snug mb-4 ink">{q.q}</div>
      <div className="grid gap-2">
        {q.choices.map((c, i) => {
          let cls = "text-left px-4 py-3 rounded-lg border bg-parchment transition flex items-start gap-3 border-ink-soft/30";
          if (locked || resolved) {
            if (resolved && i === q.correct) cls += " quiz-correct";
            else if (i === picked && i !== q.correct) cls += " quiz-wrong";
            else cls += " quiz-disabled";
          } else { cls += " hover:border-navy"; }
          return (
            <button key={i} disabled={locked || resolved} onClick={() => choose(i)} className={cls}>
              <span className="heraldic font-bold ink-soft w-6 shrink-0">{String.fromCharCode(65+i)}</span>
              <span className="ink flex-1">{c}</span>
              {(locked || resolved) && i === q.correct && <Icon.Check className="w-5 h-5 shrink-0" style={{ color:'#6f8a4a' }}/>}
            </button>
          );
        })}
      </div>
      {locked && !resolved && (
        <div className="mt-3 fadeup">
          <div className="text-sm ink-soft border-l-2 border-crimson pl-3 italic">
            Not yet — and that's fine. {q.explain}
          </div>
          <button onClick={reset} className="mt-3 inline-flex items-center gap-2 bg-crimson text-parchment heraldic font-bold px-4 py-2 rounded-lg uppercase tracking-widest text-sm hover:brightness-110">
            <Icon.Refresh className="w-4 h-4"/> Try Again
          </button>
        </div>
      )}
      {resolved && (
        <div className="mt-3 text-sm ink-soft border-l-2 pl-3 italic fadeup" style={{ borderColor:'#6f8a4a' }}>
          {q.explain}
        </div>
      )}
    </div>
  );
}

function LessonView({ questId, lessonId, state, setState, goQuest }) {
  const quest = QUESTS[questId];
  const lesson = quest?.lessons.find(l => l.id === lessonId);
  if (!quest || !lesson) {
    return <div className="wrap pt-10"><div className="ink-soft">Lesson not found.</div></div>;
  }
  const [qStates, setQStates] = useState(() => lesson.quiz.map(() => ({ tries:0, firstTryCorrect:null, resolved:false })));
  const completedAll = qStates.every(s => s.resolved);
  const firstTryCount = qStates.filter(s => s.firstTryCorrect === true).length;
  const mastery = firstTryCount / lesson.quiz.length;

  function recordCorrect(qIdx, tries) {
    setQStates(prev => prev.map((s, i) => i === qIdx ? { ...s, tries, resolved:true, firstTryCorrect: s.firstTryCorrect === null ? (tries === 1) : s.firstTryCorrect } : s));
    const isReplayBonus = canReplayForBonus(state, questId, lessonId);
    const baseXP = tries === 1 ? XP_CORRECT : XP_RETRY_CORRECT;
    const award = isReplayBonus ? baseXP * 2 : baseXP;
    setState(prev => { const ns = { ...prev, xp: prev.xp + award }; saveState(ns); return ns; });
    showXpToast(award);
  }
  function recordWrong(qIdx, tries) {
    setQStates(prev => prev.map((s, i) => i === qIdx ? { ...s, tries, firstTryCorrect: s.firstTryCorrect === null ? false : s.firstTryCorrect } : s));
    setState(prev => {
      const exists = (prev.reviewQueue || []).some(r => r.quest === questId && r.lessonId === lessonId && r.qIdx === qIdx);
      if (exists) return prev;
      const ns = { ...prev, reviewQueue: [ ...(prev.reviewQueue||[]), { quest: questId, lessonId, qIdx, addedAt: new Date().toISOString() }] };
      saveState(ns); return ns;
    });
  }
  function recordPicked(qIdx, choiceIdx, wasCorrect, tries) {
    setState(prev => {
      const quests = { ...prev.quests };
      quests[questId] = quests[questId] || { lessons: {} };
      quests[questId].lessons = { ...quests[questId].lessons };
      const cur = quests[questId].lessons[lessonId] || { attempts:{}, firstTryCorrect:0, totalQ:lesson.quiz.length, completedAt:null, bestMastery:0, replays:0 };
      const att = cur.attempts[qIdx] || { tries:0, firstTryCorrect:null, lastPicked:null };
      const ftc = att.firstTryCorrect === null ? (wasCorrect && tries === 1) : att.firstTryCorrect;
      cur.attempts[qIdx] = { tries, firstTryCorrect: ftc, lastPicked: choiceIdx };
      quests[questId].lessons[lessonId] = cur;
      const ns = { ...prev, quests };
      saveState(ns); return ns;
    });
  }

  useEffect(() => {
    if (!completedAll) return;
    setState(prev => {
      const quests = { ...prev.quests };
      quests[questId] = quests[questId] || { lessons: {} };
      const cur = { ...(quests[questId].lessons[lessonId] || { attempts:{}, firstTryCorrect:0, totalQ:lesson.quiz.length, completedAt:null, bestMastery:0, replays:0 }) };
      const prevBest = cur.bestMastery || 0;
      cur.bestMastery = Math.max(prevBest, mastery);
      cur.firstTryCorrect = firstTryCount;
      cur.totalQ = lesson.quiz.length;
      if (!cur.completedAt) cur.completedAt = new Date().toISOString();
      else if (canReplayForBonus(prev, questId, lessonId)) {
        cur.replays = (cur.replays || 0) + 1;
        cur.completedAt = new Date().toISOString();
      }
      const nextReview = (prev.reviewQueue || []).filter(r => {
        if (r.quest !== questId || r.lessonId !== lessonId) return true;
        const localState = qStates[r.qIdx];
        if (!localState) return true;
        return localState.firstTryCorrect !== true;
      });
      quests[questId].lessons[lessonId] = cur;
      let xpBonus = XP_LESSON_BONUS;
      let masteryBonus = 0;
      if (mastery >= MASTERY_THRESHOLD && prevBest < MASTERY_THRESHOLD) masteryBonus += XP_MASTERY_BONUS;
      const isReplayBonus = canReplayForBonus(prev, questId, lessonId);
      if (isReplayBonus) xpBonus *= 2;
      const newXP = prev.xp + xpBonus + masteryBonus;
      const tickedStreak = tickStreak(prev);
      showXpToast(xpBonus + masteryBonus);
      const ns = { ...prev, ...tickedStreak, quests, reviewQueue: nextReview, xp: newXP };
      saveState(ns);
      return ns;
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [completedAll]);

  const masteredNow = isLessonMastered(state, questId, lessonId) || mastery >= MASTERY_THRESHOLD;
  const idx = quest.lessons.findIndex(l => l.id === lessonId);
  const next = quest.lessons[idx + 1];
  const replayBonusBadge = canReplayForBonus(state, questId, lessonId);

  return (
    <article className="pb-safe">
      <div className="wrap-narrow pt-6">
        <button onClick={goQuest} className="heraldic text-[10px] uppercase tracking-widest ink-soft hover:text-crimson flex items-center gap-1 font-bold">
          <Icon.Back className="w-4 h-4"/> {quest.formalTitle.toUpperCase()}
        </button>
        <div className="heraldic text-xs font-bold text-gold-deep uppercase tracking-[0.25em] mt-4">{lesson.subtitle}</div>
        <h1 className="font-display text-4xl sm:text-5xl leading-[1.05] mt-1 ink">{lesson.title}</h1>
        {replayBonusBadge && (
          <div className="mt-3 inline-flex items-center gap-1 bg-crimson text-parchment text-xs heraldic uppercase tracking-widest font-bold px-3 py-1 rounded-full border border-gold">
            <Icon.Sparkle className="w-3 h-3"/> Replay bonus · 2x XP this run
          </div>
        )}
      </div>
      {quest.master && lesson.cassianIntro && (
        <div className="wrap-narrow mt-5">
          <div className="card p-4 sm:p-5 fadeup" style={{ borderLeft:'3px solid var(--gold)' }}>
            <div className="flex items-start gap-3">
              <div className="shrink-0"><MasterEmblem masterKey={quest.master} cls="sigil-sm"/></div>
              <div className="min-w-0 flex-1">
                <div className="heraldic text-[10px] font-bold text-gold-deep uppercase tracking-[0.25em]">{MASTERS[quest.master]?.name || 'Master'} says</div>
                <div className="ink leading-relaxed mt-1 italic">"{lesson.cassianIntro}"</div>
              </div>
            </div>
          </div>
        </div>
      )}
      {quest.master && (
        <div className="wrap-narrow mt-4 fadeup">
          <NarrationPanel
            text={buildLessonNarration(lesson, quest.master)}
            masterKey={quest.master}
            label={MASTERS[quest.master]?.name}/>
        </div>
      )}

      <div className="wrap-narrow mt-5">
        <div className="hero-frame rounded-md overflow-hidden">
          <img src={lesson.image} alt={lesson.title} className="w-full aspect-[16/10] object-cover" loading="eager"/>
        </div>
        <div className="text-xs ink-muted mt-2 italic">{lesson.imageCredit}</div>
      </div>
      <div className="wrap-narrow mt-10 space-y-5">
        {lesson.story.map((p, i) => (
          <p key={i} className="text-lg leading-relaxed ink fadeup" style={{ animationDelay:(i*80)+'ms' }}>{p}</p>
        ))}
      </div>
      <div className="wrap-narrow mt-10">
        <div className="principle-box p-5 sm:p-6">
          <div className="heraldic text-xs text-gold-deep font-bold uppercase tracking-[0.25em] flex items-center gap-2">
            <Icon.Sword className="w-4 h-4"/> The Principle
          </div>
          <h2 className="font-display text-3xl mt-2 ink">{lesson.principle.title}</h2>
          <p className="mt-3 ink leading-relaxed">{lesson.principle.body}</p>
          {lesson.principle.quote && (<div className="mt-4 ink-soft italic text-sm">{lesson.principle.quote}</div>)}
        </div>
      </div>
      <div className="wrap-narrow mt-6">
        <div className="modern-box p-5 sm:p-6">
          <div className="heraldic text-xs text-crimson font-bold uppercase tracking-[0.25em]">{lesson.modern.title}</div>
          <p className="mt-2 ink leading-relaxed">{lesson.modern.body}</p>
        </div>
      </div>
      <div className="wrap-narrow mt-12">
        <div className="text-center">
          <div className="heraldic text-xs text-gold-deep font-bold uppercase tracking-[0.3em]">The Trial</div>
          <h2 className="font-display text-4xl ink mt-1">Prove It</h2>
          <div className="gold-line my-4 max-w-xs mx-auto"/>
          <div className="text-sm ink-soft">
            First-try score: <span className="font-bold ink">{firstTryCount}/{lesson.quiz.length}</span> ({Math.round(mastery*100)}%) · Mastery at 80%
          </div>
        </div>
        <div className="mt-6 grid gap-3">
          {lesson.quiz.map((q, i) => (
            <QuizQuestion key={lesson.id + '-' + i} q={q} qIdx={i}
              onCorrect={(tries) => recordCorrect(i, tries)}
              onWrong={(tries) => recordWrong(i, tries)}
              onPicked={(choice, wasCorrect, tries) => recordPicked(i, choice, wasCorrect, tries)}/>
          ))}
        </div>
      </div>
      {completedAll && (
        <div className="wrap-narrow mt-10 fadeup">
          <div className={"rounded-2xl p-7 text-parchment " + (masteredNow ? "bg-navy" : "bg-crimson")}
            style={{ boxShadow: '0 20px 50px -20px rgba(15,26,44,0.55)', borderTop: '2px solid var(--gold)' }}>
            <div className="heraldic text-xs uppercase tracking-[0.3em] opacity-80">{masteredNow ? "Mastery Achieved" : "Continue the Drill"}</div>
            <div className="font-display text-4xl mt-1">
              {masteredNow ? "Mastered. Next lesson unlocked." : "Solid work — not quite mastery yet."}
            </div>
            <div className="mt-2 opacity-90">
              {masteredNow
                ? `You hit ${Math.round(mastery*100)}% on the first try. The next battle is open.`
                : `You answered every question eventually, but mastery means 80% on the FIRST try. The misses are in the Drilling Yard. Pound them flat, then come back.`}
            </div>
            <div className="mt-5 flex gap-3 flex-wrap">
              {masteredNow && next ? (
                <button onClick={() => window.location.hash = '#lesson/' + questId + '/' + next.id} className="bg-gold text-navy-deep heraldic font-bold uppercase tracking-widest text-sm px-5 py-2.5 rounded-lg hover:brightness-110">
                  Next: {next.title} →

            </div>
          </div>
        </div>
      )}
    </article>
  );
}

function DrillView({ state, setState }) {
  const queue = state.reviewQueue || [];
  const [order] = useState(() => {
    const q = [...queue];
    for (let i = q.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [q[i], q[j]] = [q[j], q[i]];
    }
    return q;
  });
  const [pos, setPos] = useState(0);

  if (order.length === 0) {
    return (
      <div className="wrap-narrow pt-10">
        <div className="card p-8 text-center">
          <Sigil cls="sigil-md" use="griffin-mark"/>
          <h1 className="font-display text-4xl ink mt-4">The Yard is Empty</h1>
          <p className="ink-soft mt-3">Nothing to drill. Go answer some lessons — every miss lands here.</p>
          <a href="#" className="inline-block mt-6 bg-navy text-parchment heraldic px-5 py-2.5 rounded-lg tracking-widest text-sm uppercase">Return to Hall</a>
        </div>
      </div>
    );
  }

  if (pos >= order.length) {
    const stillLeft = (state.reviewQueue || []).length;
    return (
      <div className="wrap-narrow pt-10 fadeup">
        <div className="card p-8 text-center">
          <Sigil cls="sigil-md" use="griffin-mark"/>
          <h1 className="font-display text-4xl ink mt-4">Drill Complete</h1>
          <p className="ink-soft mt-3">
            {stillLeft === 0
              ? "Yard empty. You beat every miss on the first try this round. That's mastery."
              : `${stillLeft} question${stillLeft===1?'':'s'} still in the yard — the ones you got eventually but not on the first try.`}
          </p>
          <div className="mt-6 flex gap-3 justify-center flex-wrap">
            <a href="#" className="bg-navy text-parchment heraldic uppercase tracking-widest text-sm px-5 py-2.5 rounded-lg">Return to Hall</a>
            {stillLeft > 0 && <button onClick={() => setPos(0)} className="card heraldic uppercase tracking-widest text-sm px-5 py-2.5 rounded-lg ink font-bold">Drill Again</button>}
          </div>
        </div>
      </div>
    );
  }

  const item = order[pos];
  const lookup = findQuestionById(item.quest, item.lessonId, item.qIdx);
  if (!lookup) { setPos(p => p + 1); return null; }

  function handleCorrect(tries) {
    showXpToast(XP_DRILL_CORRECT);
    setState(prev => {
      let nextQueue = prev.reviewQueue || [];
      if (tries === 1) {
        nextQueue = nextQueue.filter(r => !(r.quest === item.quest && r.lessonId === item.lessonId && r.qIdx === item.qIdx));
      }
      const ns = { ...prev, xp: prev.xp + XP_DRILL_CORRECT, reviewQueue: nextQueue };
      saveState(ns);
      return ns;
    });
  }

  return (
    <div className="wrap-narrow pt-6 pb-safe">
      <button onClick={() => window.location.hash = ''} className="heraldic text-[10px] uppercase tracking-widest ink-soft hover:text-crimson flex items-center gap-1 font-bold">
        <Icon.Back className="w-4 h-4"/> Return to Hall
      </button>
      <div className="mt-4 text-center">
        <div className="heraldic text-xs font-bold text-gold-deep uppercase tracking-[0.3em]">The Drilling Yard</div>
        <h1 className="font-display text-4xl ink mt-1">Beat the Misses</h1>
        <div className="gold-line my-3 max-w-xs mx-auto"/>
        <div className="text-sm ink-soft">Question {pos+1} of {order.length} · First-try wins clear the yard</div>
      </div>
      <div className="mt-4 h-2 bg-parchment-deep rounded-full overflow-hidden border border-ink-soft/30">
        <div className="h-full progress-bar transition-all duration-700" style={{ width: ((pos/order.length)*100)+'%' }}/>
      </div>
      <div className="mt-2 text-xs ink-soft text-center italic">
        From: <span className="font-bold ink">{lookup.lesson.title}</span>
      </div>
      <div className="mt-5">
        <QuizQuestion key={item.quest + '/' + item.lessonId + '/' + item.qIdx + '/' + pos}
          q={lookup.q} qIdx={pos}
          onCorrect={handleCorrect} onWrong={() => {}} onPicked={() => {}}/>
      </div>
      <div className="mt-5 flex justify-center">
        <button onClick={() => setPos(p => p + 1)} className="bg-navy text-parchment heraldic uppercase tracking-widest text-sm font-bold px-6 py-2.5 rounded-lg hover:brightness-110">
          Next Question →
        </button>
      </div>
    </div>
  );
}

function parseHash() {
  const raw = (window.location.hash || '').replace(/^#/, '');
  if (!raw) return { name: 'hub' };
  const parts = raw.split('/');
  if (parts[0] === 'drill') return { name:'drill' };
  if (parts[0] === 'quest' && parts[1]) return { name:'quest', questId: parts[1] };
  if (parts[0] === 'lesson' && parts[1] && parts[2]) return { name:'lesson', questId: parts[1], lessonId: parts[2] };
  return { name:'hub' };
}

function App() {
  const [state, setState] = useState(loadState);
  const [route, setRoute] = useState(parseHash);
  useEffect(() => {
    const onHash = () => { setRoute(parseHash()); window.scrollTo({ top:0, behavior:'instant' }); };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  function goHub() { window.location.hash = ''; }
  let body = null;
  if (route.name === 'hub') body = <Hub state={state} setState={setState}/>;
  else if (route.name === 'quest') body = <QuestView questId={route.questId} state={state}/>;
  else if (route.name === 'lesson') body = <LessonView questId={route.questId} lessonId={route.lessonId} state={state} setState={setState} goQuest={() => window.location.hash = '#quest/' + route.questId}/>;
  else if (route.name === 'drill') body = <DrillView state={state} setState={setState}/>;
  return (
    <div>
      <TopBar state={state} route={route} goHub={goHub}/>
      {body}
      <footer className="wrap py-12 text-center">
        <div className="gold-line max-w-xs mx-auto mb-4"/>
        <div className="heraldic text-xs ink-muted uppercase tracking-[0.3em]">Griffin Hall · vol. I · MMXXVI</div>
        <div className="text-xs ink-muted mt-2 italic">Images public domain via Wikimedia Commons</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
