const US_MAP_DATA = {
  gridCols: 13,
  gridRows: 8,
  cellSize: 60,
  states: US_STATES_DATA,
};

function projectLatLng(lat, lng, imgW, imgH) {
  // Equirectangular fallback for non-d3 callers / images that still use it.
  const x = ((lng + 180) / 360) * imgW;
  const y = ((90 - lat) / 180) * imgH;
  return { x, y };
}
function projectStateCell(s, cellSize) {
  return { x: s.col * cellSize, y: s.row * cellSize };
}

/* ---------- Real geographic map plumbing ----------
   Loads Natural-Earth-derived TopoJSON once per session, converts to GeoJSON,
   tags each country with a continent bucket, and exposes a d3 projection
   so the rest of the component can keep its lat/lng-based centerOn() logic. */

const FIPS_TO_POSTAL = {
  '01':'AL','02':'AK','04':'AZ','05':'AR','06':'CA','08':'CO','09':'CT','10':'DE','11':'DC',
  '12':'FL','13':'GA','15':'HI','16':'ID','17':'IL','18':'IN','19':'IA','20':'KS','21':'KY',
  '22':'LA','23':'ME','24':'MD','25':'MA','26':'MI','27':'MN','28':'MS','29':'MO','30':'MT',
  '31':'NE','32':'NV','33':'NH','34':'NJ','35':'NM','36':'NY','37':'NC','38':'ND','39':'OH',
  '40':'OK','41':'OR','42':'PA','44':'RI','45':'SC','46':'SD','47':'TN','48':'TX','49':'UT',
  '50':'VT','51':'VA','53':'WA','54':'WV','55':'WI','56':'WY',
};

function continentForCentroid(lng, lat) {
  if (lat < -60) return 'antarctica';
  if (lat > 12 && lng < -52 && lng > -180) return 'northamerica';
  if (lat <= 12 && lng > -85 && lng < -34) return 'southamerica';
  if (lat > 35 && lng >= -25 && lng < 45) return 'europe';
  if (lat > 55 && lng >= -25 && lng < 60) return 'europe';
  if (lat < -10 && lng > 110) return 'australia';
  if (lat <= 0 && lng > 130) return 'australia';
  if (lat < 38 && lng >= -20 && lng < 52) return 'africa';
  return 'asia';
}

const GEO_CACHE = { world: null, usa: null, worldPromise: null, usaPromise: null };
function loadGeo(type) {
  if (type === 'world') {
    if (GEO_CACHE.world) return Promise.resolve(GEO_CACHE.world);
    if (!GEO_CACHE.worldPromise) {
      GEO_CACHE.worldPromise = fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
        .then(r => r.json())
        .then(topo => {
          const fc = window.topojson.feature(topo, topo.objects.countries);
          const features = fc.features.map(f => {
            const c = window.d3.geoCentroid(f);
            const cont = continentForCentroid(c[0], c[1]);
            return { ...f, properties: { ...f.properties, _continent: cont, _centroid: c } };
          });
          GEO_CACHE.world = features;
          return features;
        })
        .catch(err => { console.error('world topo load failed', err); return []; });
    }
    return GEO_CACHE.worldPromise;
  } else {
    if (GEO_CACHE.usa) return Promise.resolve(GEO_CACHE.usa);
    if (!GEO_CACHE.usaPromise) {
      GEO_CACHE.usaPromise = fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
        .then(r => r.json())
        .then(topo => {
          const fc = window.topojson.feature(topo, topo.objects.states);
          const features = fc.features.map(f => {
            const fips = String(f.id).padStart(2, '0');
            const postal = FIPS_TO_POSTAL[fips] || null;
            return { ...f, properties: { ...f.properties, _postal: postal } };
          });
          GEO_CACHE.usa = features;
          return features;
        })
        .catch(err => { console.error('usa topo load failed', err); return []; });
    }
    return GEO_CACHE.usaPromise;
  }
}

const CONT_COLORS = {
  asia:'#d4a657', africa:'#c97a47', northamerica:'#7a9ac9', southamerica:'#9bc97a',
  antarctica:'#b8c6d6', europe:'#c97a91', australia:'#a47ac9',
  pacific:'#3a6ea5', atlantic:'#3a6ea5', indian:'#3a6ea5', arctic:'#3a6ea5', southern:'#3a6ea5',
};
const REGION_COLORS = {
  Northeast:'#7a9ac9', South:'#c97a47', Midwest:'#d4a657', West:'#9bc97a',
};

function InteractiveMap({ type, masterKey }) {
  const data = type === 'world' ? WORLD_MAP_DATA : US_MAP_DATA;
  const isWorld = type === 'world';

  const wrapRef = useRef(null);
  const innerRef = useRef(null);
  const [view, setView] = useState({ tx:0, ty:0, scale:1 });
  const viewRef = useRef(view);
  useEffect(() => { viewRef.current = view; }, [view]);
  // True when the next view change should animate (click-driven zoom / reset / search).
  // False during drag / wheel / pinch so user-direct manipulation feels responsive.
  const [smooth, setSmooth] = useState(false);

  const [selected, setSelected] = useState(null);
  const [query, setQuery] = useState('');
  const [highlightId, setHighlightId] = useState(null);
  const [quest, setQuest] = useState(null);
  const [capitalInput, setCapitalInput] = useState('');
  const [capitalFeedback, setCapitalFeedback] = useState(null);
  const [diff, setDiff] = useState('continents');
  const [geoFeatures, setGeoFeatures] = useState(null);

  // World uses Equal Earth on a 1000x500 canvas. USA uses d3.geoAlbersUsa on 960x600.
  const mapW = isWorld ? 1000 : 960;
  const mapH = isWorld ? 500  : 600;

  // d3 projection + path generator. Built once per (type, mapW, mapH).
  const { projection, pathFn } = useMemo(() => {
    if (!window.d3) return { projection: null, pathFn: null };
    if (isWorld) {
      const proj = window.d3.geoEqualEarth().scale(195).translate([mapW/2, mapH/2]);
      return { projection: proj, pathFn: window.d3.geoPath(proj) };
    } else {
      const proj = window.d3.geoAlbersUsa().scale(1200).translate([mapW/2, mapH/2]);
      return { projection: proj, pathFn: window.d3.geoPath(proj) };
    }
  }, [isWorld, mapW, mapH]);

  // Project a lat/lng (or state grid cell) to canvas x/y for centerOn().
  function projectFeature(f) {
    if (isWorld) {
      if (!projection) return { x: mapW/2, y: mapH/2 };
      const p = projection([f.lng, f.lat]);
      return p ? { x: p[0], y: p[1] } : { x: mapW/2, y: mapH/2 };
    }
    // USA: project state by capital lat/lng if available, else fall back to geo bbox center
    if (projection && f && f.id && geoFeatures) {
      const match = geoFeatures.find(g => g.properties._postal === f.id);
      if (match) {
        const c = window.d3.geoCentroid(match);
        const p = projection(c);
        if (p) return { x: p[0], y: p[1] };
      }
    }
    return { x: mapW/2, y: mapH/2 };
  }

  useEffect(() => {
    let cancelled = false;
    loadGeo(isWorld ? 'world' : 'usa').then(features => {
      if (!cancelled) setGeoFeatures(features);
    });
    return () => { cancelled = true; };
  }, [isWorld]);

  // Precompute SVG path strings once per feature set (cheap, but useMemo guards re-renders).
  const geoPaths = useMemo(() => {
    if (!geoFeatures || !pathFn) return [];
    return geoFeatures.map(f => ({ feature: f, d: pathFn(f) }));
  }, [geoFeatures, pathFn]);

  const allFeatures = useMemo(() => {
    if (isWorld) return [...data.continents, ...data.oceans, ...data.countries];
    return data.states.map(s => ({ ...s, kind:'state' }));
  }, [isWorld, data]);

  const dragRef = useRef(null);
  const pinchRef = useRef(null);

  function clampView(v) {
    const wrap = wrapRef.current;
    if (!wrap) return v;
    const ww = wrap.clientWidth;
    const wh = wrap.clientHeight;
    const scale = Math.max(1, Math.min(8, v.scale));
    const sw = ww * scale;
    const sh = wh * scale;
    let tx = v.tx, ty = v.ty;
    const minTx = ww - sw;
    const minTy = wh - sh;
    if (sw <= ww) tx = (ww - sw) / 2;
    else { if (tx > 0) tx = 0; if (tx < minTx) tx = minTx; }
    if (sh <= wh) ty = (wh - sh) / 2;
    else { if (ty > 0) ty = 0; if (ty < minTy) ty = minTy; }
    return { tx, ty, scale };
  }

  function onWheel(e) {
    e.preventDefault();
    const wrap = wrapRef.current; if (!wrap) return;
    const rect = wrap.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;
    const v = viewRef.current;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.max(1, Math.min(8, v.scale * delta));
    const ratio = newScale / v.scale;
    const tx = px - (px - v.tx) * ratio;
    const ty = py - (py - v.ty) * ratio;
    setSmooth(false);
    setView(clampView({ tx, ty, scale: newScale }));
  }

  function onPointerDown(e) {
    if (e.target.closest('.map-hit')) return;
    const wrap = wrapRef.current; if (!wrap) return;
    try { wrap.setPointerCapture && wrap.setPointerCapture(e.pointerId); } catch(_) {}
    dragRef.current = { startX:e.clientX, startY:e.clientY, startTx:viewRef.current.tx, startTy:viewRef.current.ty, moved:false };
  }
  function onPointerMove(e) {
    if (!dragRef.current) return;
    const dx = e.clientX - dragRef.current.startX;
    const dy = e.clientY - dragRef.current.startY;
    if (Math.abs(dx) + Math.abs(dy) > 5) {
      dragRef.current.moved = true;
      if (smooth) setSmooth(false);
    }
    setView(clampView({ tx: dragRef.current.startTx + dx, ty: dragRef.current.startTy + dy, scale: viewRef.current.scale }));
  }
  function onPointerUp(e) {
    const wrap = wrapRef.current;
    if (wrap && wrap.releasePointerCapture) try { wrap.releasePointerCapture(e.pointerId); } catch (_){}
    dragRef.current = null;
  }

  function onTouchStart(e) {
    if (e.touches.length === 2) {
      const a = e.touches[0], b = e.touches[1];
      const dist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
      const wrap = wrapRef.current; const rect = wrap.getBoundingClientRect();
      const cx = (a.clientX + b.clientX)/2 - rect.left;
      const cy = (a.clientY + b.clientY)/2 - rect.top;
      pinchRef.current = { dist, scale: viewRef.current.scale, tx:viewRef.current.tx, ty:viewRef.current.ty, cx, cy };
      dragRef.current = null;
    }
  }
  function onTouchMove(e) {
    if (e.touches.length === 2 && pinchRef.current) {
      e.preventDefault();
      const a = e.touches[0], b = e.touches[1];
      const dist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
      const p = pinchRef.current;
      const ratio = dist / p.dist;
      const newScale = Math.max(1, Math.min(8, p.scale * ratio));
      const r = newScale / p.scale;
      const tx = p.cx - (p.cx - p.tx) * r;
      const ty = p.cy - (p.cy - p.ty) * r;
      if (smooth) setSmooth(false);
      setView(clampView({ tx, ty, scale:newScale }));
    }
  }
  function onTouchEnd(e) {
    if (e.touches.length < 2) pinchRef.current = null;
  }

  function zoomBy(factor) {
    const wrap = wrapRef.current; if (!wrap) return;
    const cx = wrap.clientWidth/2, cy = wrap.clientHeight/2;
    const v = viewRef.current;
    const newScale = Math.max(1, Math.min(8, v.scale * factor));
    const r = newScale / v.scale;
    const tx = cx - (cx - v.tx) * r;
    const ty = cy - (cy - v.ty) * r;
    setSmooth(true);
    setView(clampView({ tx, ty, scale:newScale }));
  }
  function resetView() {
    setSmooth(true);
    setView({ tx:0, ty:0, scale:1 });
    setSelected(null);
    setHighlightId(null);
  }

  function scaleForKind(kind) {
    if (!isWorld) return 3;
    if (kind === 'country') return 5.5;
    if (kind === 'ocean') return 2.2;
    return 2.6; // continent (default)
  }
  function centerOn(feature, targetScale) {
    const wrap = wrapRef.current; if (!wrap) return;
    const ww = wrap.clientWidth, wh = wrap.clientHeight;
    const p = projectFeature(feature);
    const imgX = p.x, imgY = p.y;
    const scale = targetScale || scaleForKind(feature.kind);
    const sx = (imgX / mapW) * ww * scale;
    const sy = (imgY / mapH) * wh * scale;
    const tx = ww/2 - sx;
    const ty = wh/2 - sy;
    setSmooth(true);
    setView(clampView({ tx, ty, scale }));
    setHighlightId(feature.id);
  }

  function doSearch(q) {
    setQuery(q);
    const norm = q.trim().toLowerCase();
    if (!norm) { setHighlightId(null); return; }
    if (isWorld && diff === 'continents') {
      const hit = [...data.continents, ...data.oceans, ...data.countries].find(x => x.name.toLowerCase().includes(norm));
      if (hit && hit.cont) setDiff('countries');
    }
    const f = allFeatures.find(x =>
      x.name.toLowerCase() === norm ||
      x.name.toLowerCase().startsWith(norm) ||
      x.name.toLowerCase().includes(norm) ||
      (x.id && x.id.toLowerCase() === norm) ||
      (x.capital && x.capital.toLowerCase().includes(norm))
    );
    if (f) { centerOn(f); setSelected(f); }
  }

  function handleFeatureClick(f) {
    setSelected(f);
    // Zoom + pan to the picked feature. Without this, selection only updated
    // the desc card and the world stayed in its full view.
    centerOn(f, scaleForKind(f.kind));
    if (quest && quest.kind === 'find') {
      const correct = f.id === quest.targetId || f.name.toLowerCase() === quest.targetName.toLowerCase();
      setQuest(prev => prev ? ({ ...prev, result: correct ? 'right' : 'wrong' }) : prev);
    }
  }

  function speak(text) {
    try {
      if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        const profile = MASTER_VOICE_PREFS[masterKey];
        if (profile) { u.rate = profile.rate || 0.9; u.pitch = profile.pitch || 1; }
        window.speechSynthesis.speak(u);
      }
    } catch(_) {}
  }

  function startQuestFind() {
    const pool = isWorld
      ? [...data.continents, ...data.oceans, ...data.countries.filter(c=>['italy','japan','brazil','egypt','australia_c','china','india','romania','germany','france','russia','mexico','canada','iran','turkey','indonesia','uk','spain','vietnam'].includes(c.id))]
      : data.states.filter(s => s.id !== 'DC');
    const pick = pool[Math.floor(Math.random()*pool.length)];
    const masterName = MASTERS[masterKey]?.name || 'Mercator';
    const prompt = "Find " + pick.name;
    setQuest({ kind:'find', targetId:pick.id, targetName:pick.name, prompt, result:null });
    setSelected(null);
    setHighlightId(null);
    if (isWorld && pick.cont) setDiff('countries');
    speak(masterName + " says: " + prompt);
  }
  function startQuestCapital() {
    if (isWorld) return;
    const pool = data.states.filter(s=>s.id!=='DC');
    const pick = pool[Math.floor(Math.random()*pool.length)];
    setQuest({ kind:'capital', targetId:pick.id, targetName:pick.name, prompt:"What is the capital of " + pick.name + "?", expected:pick.capital, result:null });
    setSelected(null);
    setCapitalInput('');
    setCapitalFeedback(null);
    centerOn(pick);
    const masterName = MASTERS[masterKey]?.name || 'Mercator';
    speak(masterName + " asks: What is the capital of " + pick.name + "?");
  }
  function submitCapital(e) {
    e.preventDefault();
    if (!quest || quest.kind !== 'capital') return;
    const guess = capitalInput.trim().toLowerCase();
    const expected = quest.expected.toLowerCase();
    const aliases = [expected, expected.replace(/^saint /, 'st '), expected.replace(/^saint /, 'st. ')];
    if (aliases.includes(guess) || (expected.startsWith(guess) && guess.length >= 4)) {
      setCapitalFeedback({ ok:true, msg:'Correct. ' + quest.targetName + ' — ' + quest.expected + '.' });
      setQuest(prev => prev ? ({ ...prev, result:'right' }) : prev);
    } else {
      const hint = quest.expected[0] + quest.expected.slice(1).replace(/[a-z]/g, '_');
      setCapitalFeedback({ ok:false, msg:'Not quite. Hint: ' + hint });
    }
  }
  function revealCapital() {
    if (!quest || quest.kind !== 'capital') return;
    setCapitalFeedback({ ok:false, msg:'It was ' + quest.expected + '. Try another.' });
  }

  return (
    <div className="card p-3 sm:p-4" style={{ borderLeft:'3px solid var(--gold)' }}>
      <div className="flex items-center justify-between gap-2 flex-wrap">
        <div className="heraldic text-[10px] font-bold text-gold-deep uppercase tracking-[0.25em]">
          {isWorld ? "Mercator's World" : "Mercator's America"}
        </div>
        <div className="flex items-center gap-1">
          <button onClick={()=>zoomBy(1.35)} className="map-btn-mini" aria-label="Zoom in">+</button>
          <button onClick={()=>zoomBy(0.75)} className="map-btn-mini" aria-label="Zoom out">−</button>
          <button onClick={resetView} className="map-btn-mini">Reset</button>
        </div>
      </div>

      <div className="mt-2 flex flex-wrap gap-2 items-center">
        <input
          type="text"
          value={query}
          onChange={(e)=>doSearch(e.target.value)}
          placeholder={isWorld ? 'Search countries, continents, oceans…' : 'Search states or capitals…'}
          className="flex-1 min-w-[200px] px-3 py-2 rounded-md border border-gold/40 bg-parchment-warm text-ink placeholder-ink-muted text-sm focus:outline-none focus:border-gold"
        />
        {isWorld && (
          <select value={diff} onChange={(e)=>setDiff(e.target.value)} className="px-2 py-2 rounded-md border border-gold/40 bg-parchment-warm text-ink text-sm">
            <option value="continents">Continents + Oceans</option>
            <option value="countries">+ Major Countries</option>
          </select>
        )}
      </div>

      <div className="mt-2 flex flex-wrap gap-2">
        <button onClick={startQuestFind} className="map-btn-quest">
          {isWorld ? "Quest: Find a place" : "Quest: Find a state"}
        </button>
        {!isWorld && (
          <button onClick={startQuestCapital} className="map-btn-quest">Quest: Name the capital</button>
        )}
        {quest && (
          <button onClick={()=>{ setQuest(null); setCapitalFeedback(null); setHighlightId(null); }} className="map-btn-mini">Exit quest</button>
        )}
      </div>

      {quest && (
        <div className={"mt-2 p-3 rounded-md border " + (quest.result==='right' ? "bg-emerald-50 border-emerald-400" : quest.result==='wrong' ? "bg-rose-50 border-rose-400" : "bg-parchment-warm border-gold/40")}>
          <div className="heraldic text-[10px] font-bold uppercase tracking-[0.2em] text-gold-deep">
            {MASTERS[masterKey]?.name || 'Mercator'} says
          </div>
          <div className="ink italic mt-0.5">"{quest.prompt}"</div>
          {quest.kind === 'capital' && (
            <form onSubmit={submitCapital} className="mt-2 flex gap-2 items-center flex-wrap">
              <input
                type="text"
                value={capitalInput}
                onChange={(e)=>setCapitalInput(e.target.value)}
                placeholder="Type the capital…"
                className="flex-1 min-w-[180px] px-3 py-2 rounded-md border border-gold/40 bg-white text-ink text-sm"
                autoFocus
              />
              <button type="submit" className="map-btn-quest">Check</button>
              <button type="button" onClick={revealCapital} className="map-btn-mini">Reveal</button>
            </form>
          )}
          {capitalFeedback && (
            <div className={"mt-2 text-sm " + (capitalFeedback.ok ? "text-emerald-700 font-semibold" : "text-rose-700")}>
              {capitalFeedback.msg}
            </div>
          )}
          {quest.kind === 'find' && quest.result === 'right' && (
            <div className="mt-2 text-emerald-700 font-semibold text-sm">Right. That's {quest.targetName}.</div>
          )}
          {quest.kind === 'find' && quest.result === 'wrong' && (
            <div className="mt-2 text-rose-700 text-sm">Not quite. Try again — or zoom in and look for {quest.targetName}.</div>
          )}
        </div>
      )}

      <div
        ref={wrapRef}
        className="mt-3 relative overflow-hidden rounded-md border border-gold/40 select-none touch-none"
        style={{ aspectRatio: isWorld ? '1000 / 500' : '960 / 600', background: isWorld ? '#a8c8e2' : '#a8c8e2', cursor: 'grab' }}
        onWheel={onWheel}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerCancel={onPointerUp}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
      >
        <div
          ref={innerRef}
          style={{
            position:'absolute', left:0, top:0, width:'100%', height:'100%',
            transformOrigin:'0 0',
            transform: 'translate(' + view.tx + 'px, ' + view.ty + 'px) scale(' + view.scale + ')',
            transition: smooth ? 'transform 450ms cubic-bezier(0.25, 0.8, 0.25, 1)' : 'none',
            willChange:'transform',
          }}
        >
          {isWorld ? (
            <svg viewBox={"0 0 " + mapW + " " + mapH} width="100%" height="100%" style={{ display:'block' }}>
              {/* Ocean background */}
              <rect x="0" y="0" width={mapW} height={mapH} fill="#a8c8e2" />
              {/* Faint graticule (lat/lng grid) */}
              {projection && (() => {
                const graticule = window.d3.geoGraticule().step([20,20])();
                return <path d={pathFn(graticule)} fill="none" stroke="rgba(26,41,66,0.10)" strokeWidth="0.4" />;
              })()}
              {/* Country polygons */}
              {geoPaths.map(({ feature, d }, i) => {
                if (!d) return null;
                const cont = feature.properties._continent;
                const name = feature.properties.name;
                // Match country in our curated list (by name, case-insensitive contains)
                const country = data.countries.find(c =>
                  c.name.toLowerCase() === (name||'').toLowerCase()
                  || (name||'').toLowerCase().includes(c.name.toLowerCase())
                  || c.name.toLowerCase().includes((name||'').toLowerCase())
                );
                const contRecord = data.continents.find(c => c.id === cont);
                const isCountryHighlight = country && highlightId === country.id;
                const isContHighlight = highlightId && contRecord && contRecord.id === highlightId;
                const isQuestCountry = country && quest && quest.targetId === country.id;
                const isQuestCont = contRecord && quest && quest.targetId === contRecord.id;
                const isAnyHighlight = isCountryHighlight || isContHighlight || isQuestCountry || isQuestCont;
                // Dim policy: if there is a highlight, dim everything not on the highlighted continent
                let dim = 1;
                if (highlightId) {
                  if (isCountryHighlight || isQuestCountry) dim = 1;
                  else if (isContHighlight || isQuestCont || (contRecord && cont === highlightId)) dim = 0.85;
                  else dim = 0.4;
                }
                // Fill: highlighted country = gold, continent-grouped highlight = continent tint, default = parchment
                let fill = '#f4ecd8'; // parchment
                if (isCountryHighlight || isQuestCountry) fill = '#e0bd6a'; // gold-light
                else if (isContHighlight || (contRecord && cont === highlightId)) fill = CONT_COLORS[cont] || '#e6d8a9';
                else if (diff === 'countries' && country) fill = '#ece2c4'; // parchment-warm tint for known countries
                const stroke = (isCountryHighlight || isQuestCountry) ? '#9b2226' : 'rgba(26,41,66,0.55)';
                const strokeWidth = (isCountryHighlight || isQuestCountry) ? 1.8 : 0.5;
                return (
                  <path
                    key={i}
                    d={d}
                    className="map-hit"
                    fill={fill}
                    fillOpacity={dim}
                    stroke={stroke}
                    strokeWidth={strokeWidth}
                    style={{ cursor:'pointer', transition:'fill-opacity 300ms ease, fill 300ms ease' }}
                    onClick={(e) => {
                      e.stopPropagation();
                      if (country) { handleFeatureClick(country); return; }
                      if (contRecord) { handleFeatureClick(contRecord); return; }
                    }}
                  >
                    <title>{name}</title>
                  </path>
                );
              })}
              {/* Continent labels overlay (clickable) */}
              {projection && data.continents.map(c => {
                const p = projection([c.lng, c.lat]);
                if (!p) return null;
                const isH = highlightId === c.id;
                const isQuest = quest && quest.targetId === c.id;
                return (
                  <g key={c.id} className="map-hit" style={{ cursor:'pointer' }}
                     onClick={(e) => { e.stopPropagation(); handleFeatureClick(c); }}>
                    <text x={p[0]} y={p[1]} textAnchor="middle" dominantBaseline="middle"
                      style={{
                        fontFamily:'Cinzel, Georgia, serif',
                        fontWeight: 700,
                        fontSize: 18,
                        fill: isH ? '#9b2226' : '#1a2942',
                        letterSpacing:'0.12em',
                        paintOrder:'stroke',
                        stroke:'#f4ecd8',
                        strokeWidth: 3,
                        opacity: isQuest ? 1 : 0.85,
                      }}>
                      {c.name.toUpperCase()}
                    </text>
                  </g>
                );
              })}
              {/* Ocean labels overlay (clickable) */}
              {projection && data.oceans.map(o => {
                const p = projection([o.lng, o.lat]);
                if (!p) return null;
                const isH = highlightId === o.id;
                return (
                  <g key={o.id} className="map-hit" style={{ cursor:'pointer' }}
                     onClick={(e) => { e.stopPropagation(); handleFeatureClick(o); }}>
                    <text x={p[0]} y={p[1]} textAnchor="middle" dominantBaseline="middle"
                      style={{
                        fontFamily:'Cinzel, Georgia, serif',
                        fontStyle:'italic',
                        fontWeight: 500,
                        fontSize: 13,
                        fill: isH ? '#9b2226' : '#1a2942',
                        letterSpacing:'0.18em',
                        opacity: 0.65,
                      }}>
                      {o.name}
                    </text>
                  </g>
                );
              })}
              {/* Major-country pins (only in countries mode) */}
              {diff === 'countries' && projection && data.countries.map(c => {
                const p = projection([c.lng, c.lat]);
                if (!p) return null;
                const isH = highlightId === c.id;
                const isQuest = quest && quest.targetId === c.id;
                if (!isH && !isQuest) return null;
                return (
                  <g key={'pin-'+c.id} style={{ pointerEvents:'none' }}>
                    <circle cx={p[0]} cy={p[1]} r={4} fill="#9b2226" stroke="#f4ecd8" strokeWidth="1.5" />
                    <text x={p[0]} y={p[1] - 10} textAnchor="middle"
                      style={{
                        fontFamily:'Cinzel, Georgia, serif',
                        fontWeight:700,
                        fontSize: 14,
                        fill:'#0f1a2c',
                        paintOrder:'stroke',
                        stroke:'#f4ecd8',
                        strokeWidth: 4,
                      }}>
                      {c.name}
                    </text>
                  </g>
                );
              })}
              {!geoFeatures && (
                <text x={mapW/2} y={mapH/2} textAnchor="middle" dominantBaseline="middle"
                  style={{ fontFamily:'Cinzel, Georgia, serif', fontSize:18, fill:'#1a2942' }}>
                  Loading world map…
                </text>
              )}
            </svg>
          ) : (
            <svg viewBox={"0 0 " + mapW + " " + mapH} width="100%" height="100%" style={{ display:'block' }}>
              <rect x="0" y="0" width={mapW} height={mapH} fill="#a8c8e2" />
              {/* State polygons */}
              {geoPaths.map(({ feature, d }, i) => {
                if (!d) return null;
                const postal = feature.properties._postal;
                const stateRec = postal ? data.states.find(s => s.id === postal) : null;
                const isH = stateRec && highlightId === stateRec.id;
                const isQuest = stateRec && quest && quest.kind==='capital' && quest.targetId === stateRec.id;
                let dim = highlightId && !isH && !isQuest ? 0.45 : 1;
                let fill = stateRec ? (REGION_COLORS[stateRec.region] || '#e6d8a9') : '#f4ecd8';
                if (isH || isQuest) fill = '#e0bd6a';
                return (
                  <path
                    key={i}
                    d={d}
                    className="map-hit"
                    fill={fill}
                    fillOpacity={dim * 0.85}
                    stroke={(isH || isQuest) ? '#9b2226' : 'rgba(26,41,66,0.55)'}
                    strokeWidth={(isH || isQuest) ? 2 : 0.6}
                    style={{ cursor:'pointer', transition:'fill-opacity 300ms ease, fill 300ms ease' }}
                    onClick={(e) => {
                      e.stopPropagation();
                      if (stateRec) handleFeatureClick({ ...stateRec, kind: 'state' });
                    }}
                  >
                    <title>{feature.properties.name}</title>
                  </path>
                );
              })}
              {/* State postal-code labels */}
              {projection && geoPaths.map(({ feature }, i) => {
                const postal = feature.properties._postal;
                if (!postal) return null;
                const c = window.d3.geoCentroid(feature);
                const p = projection(c);
                if (!p) return null;
                return (
                  <text key={'lbl-'+i} x={p[0]} y={p[1]} textAnchor="middle" dominantBaseline="middle"
                    style={{
                      fontFamily:'Cinzel, Georgia, serif',
                      fontWeight: 700,
                      fontSize: 11,
                      fill:'#0f1a2c',
                      pointerEvents:'none',
                      paintOrder:'stroke',
                      stroke:'#f4ecd8',
                      strokeWidth: 2.5,
                    }}>
                    {postal}
                  </text>
                );
              })}
              {!geoFeatures && (
                <text x={mapW/2} y={mapH/2} textAnchor="middle" dominantBaseline="middle"
                  style={{ fontFamily:'Cinzel, Georgia, serif', fontSize:18, fill:'#1a2942' }}>
                  Loading US map…
                </text>
              )}
            </svg>
          )}
        </div>
        {!isWorld && (
          <div className="absolute bottom-1 right-1 bg-parchment-warm border border-gold/40 rounded px-2 py-1 text-[10px] heraldic uppercase tracking-widest flex gap-2">
            <span><span className="inline-block w-3 h-3 align-middle mr-1" style={{background:'#7a9ac9'}}/>NE</span>
            <span><span className="inline-block w-3 h-3 align-middle mr-1" style={{background:'#c97a47'}}/>S</span>
            <span><span className="inline-block w-3 h-3 align-middle mr-1" style={{background:'#d4a657'}}/>MW</span>
            <span><span className="inline-block w-3 h-3 align-middle mr-1" style={{background:'#9bc97a'}}/>W</span>
          </div>
        )}
      </div>

      {selected && (
        <div className="mt-3 p-3 rounded-md border border-gold/50 bg-parchment-warm">
          <div className="heraldic text-[10px] font-bold uppercase tracking-[0.2em] text-gold-deep">
            {selected.kind === 'continent' ? 'Continent' : selected.kind === 'ocean' ? 'Ocean' : selected.kind === 'state' ? (selected.region + ' state') : 'Country'}
          </div>
          <div className="font-display text-2xl ink leading-tight">{selected.name}</div>
          {selected.capital && <div className="text-sm ink-soft mt-0.5"><b>Capital:</b> {selected.capital}{selected.pop ? ' · ' : ''}{selected.pop && <span><b>Pop:</b> {selected.pop}</span>}</div>}
          {selected.desc && <p className="text-sm ink mt-1.5 leading-snug">{selected.desc}</p>}
          {selected.facts && <p className="text-xs ink-muted mt-1.5 italic">{selected.facts}</p>}
          {selected.econ && <p className="text-sm ink mt-1.5"><b>What they make:</b> {selected.econ}</p>}
        </div>
      )}
      {!selected && (
        <div className="mt-2 text-xs ink-muted italic">
          Drag to pan. Pinch / scroll to zoom. {isWorld ? 'Tap a continent, ocean, or country.' : 'Tap any state to learn what they make.'}
        </div>
      )}
    </div>
  );
}

function LessonView({ questId, lessonId, state, setState, goQuest }) {
  const quest = QUESTS[questId];
  const lesson = quest?.lessons.find(l => l.id === lessonId);
  if (!quest || !lesson) {
    return <div className="wrap pt-10"><div className="ink-soft">Lesson not found.</div></div>;
  }
  const [qStates, setQStates] = useState(() => lesson.quiz.map(() => ({ tries:0, firstTryCorrect:null, resolved:false })));
  const completedAll = qStates.every(s => s.resolved);
  const firstTryCount = qStates.filter(s => s.firstTryCorrect === true).length;
  const mastery = firstTryCount / lesson.quiz.length;

  function recordCorrect(qIdx, tries) {
    setQStates(prev => prev.map((s, i) => i === qIdx ? { ...s, tries, resolved:true, firstTryCorrect: s.firstTryCorrect === null ? (tries === 1) : s.firstTryCorrect } : s));
    const isReplayBonus = canReplayForBonus(state, questId, lessonId);
    const baseXP = tries === 1 ? XP_CORRECT : XP_RETRY_CORRECT;
    const award = isReplayBonus ? baseXP * 2 : baseXP;
    setState(prev => { const ns = { ...prev, xp: prev.xp + award }; saveState(ns); return ns; });
    showXpToast(award);
  }
  function recordWrong(qIdx, tries) {
    setQStates(prev => prev.map((s, i) => i === qIdx ? { ...s, tries, firstTryCorrect: s.firstTryCorrect === null ? false : s.firstTryCorrect } : s));
    setState(prev => {
      const exists = (prev.reviewQueue || []).some(r => r.quest === questId && r.lessonId === lessonId && r.qIdx === qIdx);
      if (exists) return prev;
      const ns = { ...prev, reviewQueue: [ ...(prev.reviewQueue||[]), { quest: questId, lessonId, qIdx, addedAt: new Date().toISOString() }] };
      saveState(ns); return ns;
    });
  }
  function recordPicked(qIdx, choiceIdx, wasCorrect, tries) {
    setState(prev => {
      const quests = { ...prev.quests };
      quests[questId] = quests[questId] || { lessons: {} };
      quests[questId].lessons = { ...quests[questId].lessons };
      const cur = quests[questId].lessons[lessonId] || { attempts:{}, firstTryCorrect:0, totalQ:lesson.quiz.length, completedAt:null, bestMastery:0, replays:0 };
      const att = cur.attempts[qIdx] || { tries:0, firstTryCorrect:null, lastPicked:null };
      const ftc = att.firstTryCorrect === null ? (wasCorrect && tries === 1) : att.firstTryCorrect;
      cur.attempts[qIdx] = { tries, firstTryCorrect: ftc, lastPicked: choiceIdx };
      quests[questId].lessons[lessonId] = cur;
      const ns = { ...prev, quests };
      saveState(ns); return ns;
    });
  }

  useEffect(() => {
    if (!completedAll) return;
    setState(prev => {
      const quests = { ...prev.quests };
      quests[questId] = quests[questId] || { lessons: {} };
      const cur = { ...(quests[questId].lessons[lessonId] || { attempts:{}, firstTryCorrect:0, totalQ:lesson.quiz.length, completedAt:null, bestMastery:0, replays:0 }) };
      const prevBest = cur.bestMastery || 0;
      cur.bestMastery = Math.max(prevBest, mastery);
      cur.firstTryCorrect = firstTryCount;
      cur.totalQ = lesson.quiz.length;
      if (!cur.completedAt) cur.completedAt = new Date().toISOString();
      else if (canReplayForBonus(prev, questId, lessonId)) {
        cur.replays = (cur.replays || 0) + 1;
        cur.completedAt = new Date().toISOString();
      }
      const nextReview = (prev.reviewQueue || []).filter(r => {
        if (r.quest !== questId || r.lessonId !== lessonId) return true;
        const localState = qStates[r.qIdx];
        if (!localState) return true;
        return localState.firstTryCorrect !== true;
      });
      quests[questId].lessons[lessonId] = cur;
      let xpBonus = XP_LESSON_BONUS;
      let masteryBonus = 0;
      if (mastery >= MASTERY_THRESHOLD && prevBest < MASTERY_THRESHOLD) masteryBonus += XP_MASTERY_BONUS;
      const isReplayBonus = canReplayForBonus(prev, questId, lessonId);
      if (isReplayBonus) xpBonus *= 2;
      const newXP = prev.xp + xpBonus + masteryBonus;
      const tickedStreak = tickStreak(prev);
      showXpToast(xpBonus + masteryBonus);
      const ns = { ...prev, ...tickedStreak, quests, reviewQueue: nextReview, xp: newXP };
      saveState(ns);
      return ns;
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [completedAll]);

  const masteredNow = isLessonMastered(state, questId, lessonId) || mastery >= MASTERY_THRESHOLD;
  const idx = quest.lessons.findIndex(l => l.id === lessonId);
  const next = quest.lessons[idx + 1];
  const replayBonusBadge = canReplayForBonus(state, questId, lessonId);

  return (
    <article className="pb-safe">
      <div className="wrap-narrow pt-6">
        <button onClick={goQuest} className="heraldic text-[10px] uppercase tracking-widest ink-soft hover:text-crimson flex items-center gap-1 font-bold">
          <Icon.Back className="w-4 h-4"/> {quest.formalTitle.toUpperCase()}
        </button>
        <div className="heraldic text-xs font-bold text-gold-deep uppercase tracking-[0.25em] mt-4">{lesson.subtitle}</div>
        <h1 className="font-display text-4xl sm:text-5xl leading-[1.05] mt-1 ink">{lesson.title}</h1>
        {replayBonusBadge && (
          <div className="mt-3 inline-flex items-center gap-1 bg-crimson text-parchment text-xs heraldic uppercase tracking-widest font-bold px-3 py-1 rounded-full border border-gold">
            <Icon.Sparkle className="w-3 h-3"/> Replay bonus · 2x XP this run
          </div>
        )}
      </div>
      {quest.master && lesson.cassianIntro && (
        <div className="wrap-narrow mt-5">
          <div className="card p-4 sm:p-5 fadeup" style={{ borderLeft:'3px solid var(--gold)' }}>
            <div className="flex items-start gap-3">
              <div className="shrink-0"><MasterEmblem masterKey={quest.master} cls="sigil-sm"/></div>
              <div className="min-w-0 flex-1">
                <div className="heraldic text-[10px] font-bold text-gold-deep uppercase tracking-[0.25em]">{MASTERS[quest.master]?.name || 'Master'} says</div>
                <div className="ink leading-relaxed mt-1 italic">"{lesson.cassianIntro}"</div>
              </div>
            </div>
          </div>
        </div>
      )}
      {quest.master && (
        <div className="wrap-narrow mt-4 fadeup">
          <NarrationPanel
            text={buildLessonNarration(lesson, quest.master)}
            masterKey={quest.master}
            audioUrl={lesson.audioUrl}
            label={MASTERS[quest.master]?.name}/>
        </div>
      )}

      <div className="wrap-narrow mt-5">
        <div className="hero-frame rounded-md overflow-hidden">
          {lesson.videoUrl ? (
            <video
              src={lesson.videoUrl}
              autoPlay
              loop
              muted
              playsInline
              preload="auto"
              className="w-full aspect-[16/10] object-cover bg-black"
            />
          ) : (
            <img src={lesson.image} alt={lesson.title} className="w-full aspect-[16/10] object-cover" loading="eager"/>
          )}
        </div>
        <div className="text-xs ink-muted mt-2 italic">{lesson.imageCredit}</div>
      </div>
      {lesson.interactiveMap && (
        <div className="wrap-narrow mt-6 fadeup">
          <InteractiveMap type={lesson.interactiveMap} masterKey={quest.master} />
        </div>
      )}
      <div className="wrap-narrow mt-10 space-y-5">
        {lesson.story.map((p, i) => (
          <p key={i} className="text-lg leading-relaxed ink fadeup" style={{ animationDelay:(i*80)+'ms' }}>{p}</p>
        ))}
      </div>
      {lesson.bodyCallout && (
        <div className="wrap-narrow mt-6">
          <p className="body-callout">{lesson.bodyCallout}</p>
        </div>
      )}
      {lesson.dispatch && (
        <div className="wrap-narrow mt-8">
          <details className="dispatch-letter">
            <summary className="dispatch-summary heraldic text-xs font-bold uppercase tracking-[0.25em]">
              <span className="dispatch-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
                  <rect x="2.2" y="5.2" width="19.6" height="13.6" rx="1.4" fill="#f4e8c8" stroke="#7a5a2c" strokeWidth="1"/>
                  <path d="M2.6 5.8 L12 13.2 L21.4 5.8" fill="none" stroke="#7a5a2c" strokeWidth="1" strokeLinejoin="round"/>
                  <circle cx="12" cy="15" r="4.6" fill="#9b2226" stroke="#5e1213" strokeWidth="0.6"/>
                  <circle cx="12" cy="15" r="3.4" fill="none" stroke="#3a0708" strokeWidth="0.35" opacity="0.55"/>
                  <text x="12" y="16.85" textAnchor="middle" fontFamily="Georgia, serif" fontSize="4.6" fontWeight="700" fill="#3a0708" letterSpacing="-0.3">GW</text>
                </svg>
              </span>
              Read the General's Own Dispatch
              <span className="dispatch-chevron" aria-hidden="true">▾</span>
            </summary>
            <div className="dispatch-body">
              <div className="dispatch-seal" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="36" height="36" xmlns="http://www.w3.org/2000/svg">
                  <rect x="2.2" y="5.2" width="19.6" height="13.6" rx="1.4" fill="#f4e8c8" stroke="#7a5a2c" strokeWidth="1"/>
                  <path d="M2.6 5.8 L12 13.2 L21.4 5.8" fill="none" stroke="#7a5a2c" strokeWidth="1" strokeLinejoin="round"/>
                  <circle cx="12" cy="15" r="4.6" fill="#9b2226" stroke="#5e1213" strokeWidth="0.6"/>
                  <circle cx="12" cy="15" r="3.4" fill="none" stroke="#3a0708" strokeWidth="0.35" opacity="0.55"/>
                  <text x="12" y="16.85" textAnchor="middle" fontFamily="Georgia, serif" fontSize="4.6" fontWeight="700" fill="#3a0708" letterSpacing="-0.3">GW</text>
                </svg>
              </div>
              <div className="dispatch-date">{lesson.dispatch.date}</div>
              {lesson.dispatch.paragraphs.map((p, i) => (
                <p key={i} className="dispatch-p">{p}</p>
              ))}
              {lesson.dispatch.closingQuote && (
                <p className="dispatch-quote">{lesson.dispatch.closingQuote}</p>
              )}
              {lesson.dispatch.signature && (
                <div className="dispatch-sig">{lesson.dispatch.signature}</div>
              )}
            </div>
          </details>
        </div>
      )}
      {lesson.cards && (
        <div className="wrap-narrow mt-8">
          <CardsBlock cards={lesson.cards}/>
        </div>
      )}
      <div className="wrap-narrow mt-10">
        <div className="principle-box p-5 sm:p-6">
          <div className="heraldic text-xs text-gold-deep font-bold uppercase tracking-[0.25em] flex items-center gap-2">
            <Icon.Sword className="w-4 h-4"/> The Principle
          </div>
          <h2 className="font-display text-3xl mt-2 ink">{lesson.principle.title}</h2>
          <p className="mt-3 ink leading-relaxed">{lesson.principle.body}</p>
          {lesson.principle.quote && (<div className="mt-4 ink-soft italic text-sm">{lesson.principle.quote}</div>)}
        </div>
      </div>
      <div className="wrap-narrow mt-6">
        <div className="modern-box p-5 sm:p-6">
          <div className="heraldic text-xs text-crimson font-bold uppercase tracking-[0.25em]">{lesson.modern.title}</div>
          <p className="mt-2 ink leading-relaxed">{lesson.modern.body}</p>
        </div>
      </div>
      {lesson.typeDrill && (
        <div className="wrap-narrow mt-8">
          <TypeDrillBlock drill={lesson.typeDrill} onCorrect={() => {
            setState(prev => { const ns = { ...prev, xp: prev.xp + 2 }; saveState(ns); return ns; });
          }}/>
        </div>
      )}
      <div className="wrap-narrow mt-12">
        <div className="text-center">
          <div className="heraldic text-xs text-gold-deep font-bold uppercase tracking-[0.3em]">The Trial</div>
          <h2 className="font-display text-4xl ink mt-1">Prove It</h2>
          <div className="gold-line my-4 max-w-xs mx-auto"/>
          <div className="text-sm ink-soft">
            First-try score: <span className="font-bold ink">{firstTryCount}/{lesson.quiz.length}</span> ({Math.round(mastery*100)}%) · Mastery at 80%
          </div>
        </div>
        <div className="mt-6 grid gap-3">
          {lesson.quiz.map((q, i) => (
            <QuizQuestion key={lesson.id + '-' + i} q={q} qIdx={i}
              onCorrect={(tries) => recordCorrect(i, tries)}
              onWrong={(tries) => recordWrong(i, tries)}
              onPicked={(choice, wasCorrect, tries) => recordPicked(i, choice, wasCorrect, tries)}/>
          ))}
        </div>
      </div>
      {completedAll && (
        <div className="wrap-narrow mt-10 fadeup">
          <div className={"rounded-2xl p-7 text-parchment " + (masteredNow ? "bg-navy" : "bg-crimson")}
            style={{ boxShadow: '0 20px 50px -20px rgba(15,26,44,0.55)', borderTop: '2px solid var(--gold)' }}>
            <div className="heraldic text-xs uppercase tracking-[0.3em] opacity-80">{masteredNow ? "Mastery Achieved" : "Continue the Drill"}</div>
            <div className="font-display text-4xl mt-1">
              {masteredNow ? "Mastered. Next lesson unlocked." : "Solid work — not quite mastery yet."}
            </div>
            <div className="mt-2 opacity-90">
              {masteredNow
                ? `You hit ${Math.round(mastery*100)}% on the first try. The next battle is open.`
                : `You answered every question eventually, but mastery means 80% on the FIRST try. The misses are in the Drilling Yard. Pound them flat, then come back.`}
            </div>
            <div className="mt-5 flex gap-3 flex-wrap">
              {masteredNow && next ? (
                <button onClick={() => window.location.hash = '#lesson/' + questId + '/' + next.id} className="bg-gold text-navy-deep heraldic font-bold uppercase tracking-widest text-sm px-5 py-2.5 rounded-lg hover:brightness-110">
                  Next: {next.title} →
                </button>
              ) : null}
              <button onClick={goQuest} className="bg-parchment/15 text-parchment heraldic font-bold uppercase tracking-widest text-sm px-5 py-2.5 rounded-lg hover:bg-parchment/25">All Lessons</button>
              <button onClick={() => window.location.hash = '#drill'} className="bg-parchment/15 text-parchment heraldic font-bold uppercase tracking-widest text-sm px-5 py-2.5 rounded-lg hover:bg-parchment/25">Drilling Yard</button>
            </div>
          </div>
        </div>
      )}
    </article>
  );
}

function DrillView({ state, setState }) {
  const queue = state.reviewQueue || [];
  const [order] = useState(() => {
    const q = [...queue];
    for (let i = q.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [q[i], q[j]] = [q[j], q[i]];
    }
    return q;
  });
  const [pos, setPos] = useState(0);

  if (order.length === 0) {
    return (
      <div className="wrap-narrow pt-10">
        <div className="card p-8 text-center">
          <Sigil cls="sigil-md" use="griffin-mark"/>
          <h1 className="font-display text-4xl ink mt-4">The Yard is Empty</h1>
          <p className="ink-soft mt-3">Nothing to drill. Go answer some lessons — every miss lands here.</p>
          <a href="#" className="inline-block mt-6 bg-navy text-parchment heraldic px-5 py-2.5 rounded-lg tracking-widest text-sm uppercase">Return to Hall</a>
        </div>
      </div>
    );
  }

  if (pos >= order.length) {
    const stillLeft = (state.reviewQueue || []).length;
    return (
      <div className="wrap-narrow pt-10 fadeup">
        <div className="card p-8 text-center">
          <Sigil cls="sigil-md" use="griffin-mark"/>
          <h1 className="font-display text-4xl ink mt-4">Drill Complete</h1>
          <p className="ink-soft mt-3">
            {stillLeft === 0
              ? "Yard empty. You beat every miss on the first try this round. That's mastery."
              : `${stillLeft} question${stillLeft===1?'':'s'} still in the yard — the ones you got eventually but not on the first try.`}
          </p>
          <div className="mt-6 flex gap-3 justify-center flex-wrap">
            <a href="#" className="bg-navy text-parchment heraldic uppercase tracking-widest text-sm px-5 py-2.5 rounded-lg">Return to Hall</a>
            {stillLeft > 0 && <button onClick={() => setPos(0)} className="card heraldic uppercase tracking-widest text-sm px-5 py-2.5 rounded-lg ink font-bold">Drill Again</button>}
          </div>
        </div>
      </div>
    );
  }

  const item = order[pos];
  const lookup = findQuestionById(item.quest, item.lessonId, item.qIdx);
  if (!lookup) { setPos(p => p + 1); return null; }

  function handleCorrect(tries) {
    showXpToast(XP_DRILL_CORRECT);
    setState(prev => {
      let nextQueue = prev.reviewQueue || [];
      if (tries === 1) {
        nextQueue = nextQueue.filter(r => !(r.quest === item.quest && r.lessonId === item.lessonId && r.qIdx === item.qIdx));
      }
      const ns = { ...prev, xp: prev.xp + XP_DRILL_CORRECT, reviewQueue: nextQueue };
      saveState(ns);
      return ns;
    });
  }

  return (
    <div className="wrap-narrow pt-6 pb-safe">
      <button onClick={() => window.location.hash = ''} className="heraldic text-[10px] uppercase tracking-widest ink-soft hover:text-crimson flex items-center gap-1 font-bold">
        <Icon.Back className="w-4 h-4"/> Return to Hall
      </button>
      <div className="mt-4 text-center">
        <div className="heraldic text-xs font-bold text-gold-deep uppercase tracking-[0.3em]">The Drilling Yard</div>
        <h1 className="font-display text-4xl ink mt-1">Beat the Misses</h1>
        <div className="gold-line my-3 max-w-xs mx-auto"/>
        <div className="text-sm ink-soft">Question {pos+1} of {order.length} · First-try wins clear the yard</div>
      </div>
      <div className="mt-4 h-2 bg-parchment-deep rounded-full overflow-hidden border border-ink-soft/30">
        <div className="h-full progress-bar transition-all duration-700" style={{ width: ((pos/order.length)*100)+'%' }}/>
      </div>
      <div className="mt-2 text-xs ink-soft text-center italic">
        From: <span className="font-bold ink">{lookup.lesson.title}</span>
      </div>
      <div className="mt-5">
        <QuizQuestion key={item.quest + '/' + item.lessonId + '/' + item.qIdx + '/' + pos}
          q={lookup.q} qIdx={pos}
          onCorrect={handleCorrect} onWrong={() => {}} onPicked={() => {}}/>
      </div>
      <div className="mt-5 flex justify-center">
        <button onClick={() => setPos(p => p + 1)} className="bg-navy text-parchment heraldic uppercase tracking-widest text-sm font-bold px-6 py-2.5 rounded-lg hover:brightness-110">
          Next Question →
        </button>
      </div>
    </div>
  );
}

function parseHash() {
  const raw = (window.location.hash || '').replace(/^#/, '');
  if (!raw) return { name: 'hub' };
  const parts = raw.split('/');
  if (parts[0] === 'drill') return { name:'drill' };
  if (parts[0] === 'quest' && parts[1]) return { name:'quest', questId: parts[1] };
  if (parts[0] === 'lesson' && parts[1] && parts[2]) return { name:'lesson', questId: parts[1], lessonId: parts[2] };
  return { name:'hub' };
}

function App() {
  const [state, setState] = useState(loadState);
  const [route, setRoute] = useState(parseHash);
  useEffect(() => {
    const onHash = () => { setRoute(parseHash()); window.scrollTo({ top:0, behavior:'instant' }); };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  function goHub() { window.location.hash = ''; }
  let body = null;
  if (route.name === 'hub') body = <Hub state={state} setState={setState}/>;
  else if (route.name === 'quest') body = <QuestView questId={route.questId} state={state}/>;
  else if (route.name === 'lesson') body = <LessonView questId={route.questId} lessonId={route.lessonId} state={state} setState={setState} goQuest={() => window.location.hash = '#quest/' + route.questId}/>;
  else if (route.name === 'drill') body = <DrillView state={state} setState={setState}/>;
  return (
    <div>
      <TopBar state={state} route={route} goHub={goHub}/>
      {body}
      <footer className="wrap py-12 text-center">
        <div className="gold-line max-w-xs mx-auto mb-4"/>
        <div className="heraldic text-xs ink-muted uppercase tracking-[0.3em]">Griffin Hall · vol. I · MMXXVI</div>
        <div className="text-xs ink-muted mt-2 italic">Images public domain via Wikimedia Commons</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
